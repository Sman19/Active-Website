<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>2017 F87 M2 Coupe Database</title>

  <link
    id="favicon"
    rel="icon"
    type="image/png"
    href="https://raw.githubusercontent.com/Sman19/Functioning-Website/ac241a80e9369136c2629f014a56dfff7f28fa03/carbo-insta_1080x1080%20Favicon.png"
  />

  <!-- AuthPro page protection -->
  <script type="text/javascript" src="https://www.authpro.com/auth/sman201/?action=pp"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #ffffff;
      font-size: 13px;
      color: #111827;
    }

    .app-shell { width: 100%; }

    .top-nav {
      height: 64px;
      background: #3b3f46;
      color: #ffffff;
      display: flex;
      align-items: center;
      padding: 0 32px;
      box-sizing: border-box;
    }

    .top-nav-left,
    .top-nav-center,
    .top-nav-right {
      display: flex;
      align-items: center;
    }

    .top-nav-left { flex: 1; }

    .top-nav-center {
      flex: 2;
      justify-content: center;
      gap: 8px;
      font-size: 16px;
    }

    .top-nav-right {
      flex: 1;
      justify-content: flex-end;
      gap: 8px;
    }

    .top-nav-home {
      font-size: 16px;
      color: #ffffff;
      text-decoration: none;
    }
    
    .top-nav-home:hover {
      text-decoration: underline;
    }

    .user-menu {
      position: relative;
    }

    .user-menu-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      background: transparent;
      border: none;
      color: #ffffff;
      cursor: pointer;
      font-size: 16px;
      padding: 6px 10px;
      border-radius: 6px;
    }

    .user-menu-btn:hover {
      background: rgba(255,255,255,0.08);
    }

    .user-menu-dropdown {
      position: absolute;
      right: 0;
      top: calc(100% + 8px);
      min-width: 160px;
      background: #ffffff;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.15);
      padding: 6px;
      display: none;
      z-index: 2000;
    }

    .user-menu-dropdown.open {
      display: block;
    }

    .user-menu-link {
      display: block;
      text-decoration: none;
      color: #111827;
      padding: 10px 12px;
      border-radius: 6px;
      font-size: 14px;
    }

    .user-menu-link:hover {
      background: #f3f4f6;
    }

    .owner-row {
      display: flex;
      align-items: center;
      padding: 20px 32px 8px;
      box-sizing: border-box;
      gap: 12px;
    }

    .owner-pill {
      width: 6px;
      height: 40px;
      border-radius: 999px;
      background: #e11d21;
    }

    .owner-labels {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .owner-main { font-size: 22px; }
    .owner-sub { font-size: 22px; color: #e11d21; }

    .page-layout {
      display: flex;
      width: 100%;
      min-height: calc(100vh - 64px);
    }

    .left-sidebar {
      width: 240px;
      min-width: 240px;
      background: #f3f4f6;
      border-right: 1px solid #d1d5db;
      padding: 18px 14px;
      position: relative;
      transition: width 0.25s ease, min-width 0.25s ease, padding 0.25s ease;
      overflow: hidden;
    }

    .left-sidebar.collapsed {
      width: 44px;
      min-width: 44px;
      padding: 18px 6px;
    }

    .left-sidebar.collapsed .sidebar-content {
      display: none;
    }

    .sidebar-toggle {
      position: absolute;
      top: 14px;
      right: 8px;
      width: 28px;
      height: 28px;
      border: 1px solid #d1d5db;
      border-radius: 999px;
      background: #ffffff;
      color: #374151;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 700;
    }

    .sidebar-toggle:hover {
      background: #e5e7eb;
    }

    .sidebar-section {
      margin-bottom: 18px;
    }

    .sidebar-title {
      font-size: 18px;
      font-weight: 700;
      color: #374151;
      margin-bottom: 16px;
    }

    .sidebar-label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      color: #4b5563;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 8px;
    }

    .sidebar-select {
      width: 100%;
      height: 38px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      background: #ffffff;
      color: #111827;
      font-size: 14px;
      padding: 0 10px;
      outline: none;
    }

    .sidebar-select:focus {
      border-color: #2563eb;
    }

    .main-content {
      flex: 1;
      min-width: 0;
    }

    .summary-row {
      padding: 8px 32px 8px;
      border-bottom: 1px solid #e5e7eb;
      box-sizing: border-box;
    }

    .summary-left {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .summary-checkbox { width: 16px; height: 16px; }
    .summary-text { font-size: 18px; }

    .badge-m2 {
      background: #007bff;
      color: #ffffff;
      padding: 2px 10px;
      border-radius: 4px;
      font-size: 14px;
    }

    .active-filters-inline {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      margin-left: 4px;
    }

    .filter-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #111827;
      color: #fff;
      padding: 5px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 500;
      line-height: 1;
      white-space: nowrap;
    }

    .filter-chip-remove {
      cursor: pointer;
      font-weight: 700;
      opacity: 0.9;
    }

    .filter-chip-remove:hover {
      opacity: 1;
    }

    .clear-filters-btn {
      border: 1px solid #d1d5db;
      background: #ffffff;
      color: #111827;
      border-radius: 999px;
      padding: 5px 10px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      line-height: 1;
    }

    .clear-filters-btn:hover {
      background: #f3f4f6;
    }

    .grid-wrapper { width: 100%; overflow-x: auto; }
    .grid-inner { min-width: 1800px; }

    .column-labels {
      display: flex;
      align-items: stretch;
      background: #f3f4f6;
      padding: 10px 8px 4px;
      box-sizing: border-box;
      border-bottom: 1px solid #d1d5db;
    }

    .header-cell {
      padding: 0 4px;
      display: flex;
      align-items: center;
      box-sizing: border-box;
      flex: 0 0 auto;
      font-weight: 600;
      color: #4b5563;
      font-size: 14px;
    }

    .header-status { width: 40px; }
    .header-checkbox { width: 40px; }
    .header-image { width: 100px; }
    .header-model { width: 60px; }
    .header-exterior { width: 220px; }
    .header-interior { width: 220px; }
    .header-year { width: 70px; }
    .header-vin { width: 200px; }
    .header-packages { width: 400px; }
    .header-msrp { width: 120px; }
    .header-dealer { width: 240px; }

    .cell-status { width: 40px; }
    .cell-checkbox { width: 40px; }
    .cell-image { width: 100px; }
    .cell-model { width: 60px; }
    .cell-exterior { width: 220px; }
    .cell-interior { width: 220px; }
    .cell-year { width: 70px; }
    .cell-vin { width: 200px; }
    .cell-packages { width: 400px; }
    .cell-msrp { width: 120px; }
    .cell-dealer { width: 240px; }

    .side-panel {
      position: fixed;
      right: -400px;
      top: 64px;
      width: 400px;
      height: calc(100vh - 64px);
      background: white;
      box-shadow: -2px 0 8px rgba(0,0,0,0.15);
      transition: right 0.3s ease;
      z-index: 1000;
      overflow-y: auto;
    }

    .side-panel.open { right: 0; }

    .side-panel-header {
      background: white;
      padding: 16px 20px;
      border-bottom: 1px solid #e5e7eb;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .side-panel-header-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .side-panel-title { font-size: 13px; color: #6b7280; }

    .side-panel-close {
      background: none;
      border: none;
      font-size: 20px;
      cursor: pointer;
      color: #6b7280;
      padding: 4px;
    }

    .side-panel-close:hover { color: #1f2937; }

    .side-panel-vehicle-name {
      font-size: 18px;
      font-weight: 600;
      color: #1f2937;
      margin-bottom: 4px;
    }

    .side-panel-vehicle-info { font-size: 13px; color: #6b7280; }

    .side-panel-divider {
      background: #dc2626;
      padding: 8px 0;
      text-align: center;
      cursor: pointer;
    }

    .side-panel-divider-arrow { color: white; font-size: 14px; }

    .side-panel-menu { background: #dc2626; padding: 0; }
    .side-panel-menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0; }

    .side-panel-menu-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px 16px;
      background: #dc2626;
      cursor: pointer;
      transition: background 0.2s;
      border: none;
      border-right: 1px solid rgba(255, 255, 255, 0.1);
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      color: white;
      min-height: 80px;
    }

    .side-panel-menu-item:nth-child(2n) { border-right: none; }
    .side-panel-menu-item:hover { background: #b91c1c; }
    .side-panel-menu-icon { margin-bottom: 8px; font-size: 18px; }
    .side-panel-menu-text { font-size: 14px; font-weight: 500; text-align: center; }

    .selection-count {
      position: fixed;
      top: 72px;
      right: 20px;
      background: white;
      padding: 8px 16px;
      border-radius: 6px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      font-size: 14px;
      font-weight: 600;
      z-index: 999;
      display: none;
    }

    .selection-count.visible { display: block; }

    .cell-checkbox input[type="checkbox"]:checked { accent-color: #2563eb; }

    .table-row.selected {
      background: #dbeafe !important;
      border-left: 3px solid #2563eb;
    }

    .table-header {
      display: flex;
      align-items: center;
      background: #eceff1;
      padding: 4px 8px;
      border-bottom: 1px solid #d1d5db;
    }

    .filter-input {
      width: 100%;
      padding: 4px 6px;
      border-radius: 10px;
      border: 1px solid #d1d5db;
      font-size: 13px;
      height: 30px;
      background: #ffffff;
      color: #111827;
      outline: none;
      transition: box-shadow 0.2s ease, border-color 0.2s ease;
    }

    .filter-input:focus {
      border-color: transparent;
      background: linear-gradient(
        135deg,
        #0f0f10,
        #1a1a1d,
        #2a004f,
        #7a00ff,
        #00e0ff
      );
      background-size: 500% 500%;
      animation: gradientFlow 18s ease infinite;
      color: #ffffff;
      box-shadow: 0 0 0 3px rgba(0,224,255,0.18), 0 0 0 6px rgba(122,0,255,0.12);
    }

    .filter-input:focus::placeholder { color: rgba(255,255,255,0.75); }

    @keyframes gradientFlow {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .status-circle {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: #10b981;
      color: #ffffff;
      text-align: center;
      line-height: 24px;
      font-size: 12px;
      font-weight: 600;
    }

    .cell-checkbox input[type="checkbox"] { width: 16px; height: 16px; cursor: pointer; }

    .table-row {
      display: flex;
      align-items: center;
      padding: 12px 8px;
      background: #f3f4f6;
      border-bottom: 1px solid #ddd;
      min-height: 50px;
    }

    .table-row:nth-child(even) { background: #eceff1; }

    .cell {
      padding: 0 4px;
      display: flex;
      align-items: center;
      font-size: 14px;
      line-height: 1.4;
      box-sizing: border-box;
      flex: 0 0 auto;
    }

    .exterior-thumbnail {
      width: 90px;
      height: 60px;
      object-fit: cover;
      border-radius: 4px;
      background: #f3f4f6;
    }

    .model-code { font-weight: 600; color: #1e293b; font-size: 13px; }

    .color-display { display: flex; align-items: center; gap: 8px; }

    .color-circle {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 1px solid #999;
      flex-shrink: 0;
    }

    .interior-display { display: flex; align-items: center; gap: 8px; }

    .interior-square {
      width: 32px;
      height: 32px;
      border-radius: 4px;
      background-size: cover;
      background-position: center;
      border: 1px solid #999;
      flex-shrink: 0;
    }

    .cell-vin {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      gap: 6px;
    }

    .vin-text {
      display: inline-block;
      color: #111827;
      padding: 0;
      font-weight: 500;
      letter-spacing: 0.02em;
      font-size: 13px;
    }

    .cell-msrp { font-weight: 600; color: #059669; }

    .packages-short {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 360px;
      display: block;
    }

    .copy-btn {
      border: 1px solid #d1d5db;
      background: #f9fafb;
      border-radius: 4px;
      font-size: 11px;
      padding: 2px 5px;
      cursor: pointer;
    }

    .copy-btn:hover { background: #e5e7eb; }

    .copy-btn.copied {
      background: #16a34a;
      border-color: #16a34a;
      color: #fff;
    }

    .tooltip { position: relative; }
    .tooltiptext { display: none; position: absolute; z-index: 20; }
    .tooltip:hover .tooltiptext { display: block; }

    .tooltip-red-content {
      background: #b91c1c;
      color: #fff;
      padding: 10px 18px;
      border-radius: 8px;
      font-size: 15px;
      line-height: 1.35;
      top: 110%;
      left: 0;
      white-space: nowrap;
      box-shadow: 0 8px 18px rgba(0,0,0,0.35);
    }

    .tooltip-packages {
      background: #b91c1c;
      color: #fff;
      padding: 12px 18px;
      border-radius: 8px;
      font-size: 14px;
      line-height: 1.5;
      top: 110%;
      left: 0;
      min-width: 300px;
      max-width: 450px;
      white-space: normal;
      box-shadow: 0 8px 18px rgba(0,0,0,0.35);
    }

    .tooltip-packages div { margin: 4px 0; }

    .loading { text-align: center; padding: 60px 20px; color: #64748b; }

    .loading-spinner {
      width: 50px;
      height: 50px;
      border: 4px solid #e2e8f0;
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>

<body>
  <div class="app-shell">
    <header class="top-nav">
      <div class="top-nav-left">
        <a class="top-nav-home" href="Home.html">Home</a>
      </div>
      <div class="top-nav-center">
        <span>F87 M2 U.S</span>
        <span class="divider">|</span>
        <span>U.S Database</span>
      </div>
      <div class="top-nav-right">
        <div class="user-menu" id="user-menu">
          <button class="user-menu-btn" id="user-menu-btn" type="button" onclick="toggleUserMenu()">
            <span id="auth-username">Member</span>
            <span class="user-icon">👤</span>
          </button>
          <div class="user-menu-dropdown" id="user-menu-dropdown">
            <a class="user-menu-link" href="https://www.authpro.com/auth/sman201/?action=logout">Logout</a>
          </div>
        </div>
      </div>
    </header>

    <div class="owner-row">
      <div class="owner-pill"></div>
      <div class="owner-labels">
        <span class="owner-main">Owner images</span>
        <span class="owner-sub">F87 M2 Inventory</span>
      </div>
    </div>

    <div class="page-layout">
      <aside class="left-sidebar" id="left-sidebar">
        <button class="sidebar-toggle" id="sidebar-toggle" onclick="toggleSidebar()" title="Hide filters">◀</button>

        <div class="sidebar-content">
          <div class="sidebar-title">Filter Inventory</div>

          <div class="sidebar-section">
            <label class="sidebar-label" for="dataset-select">Dataset</label>
            <select id="dataset-select" class="sidebar-select" onchange="handleDatasetChange(this.value)">
              <option value="2016 F87 M2.csv">2016 M2</option>
              <option value="2017 F87 M2.csv">2017 M2</option>
            </select>
          </div>
        </div>
      </aside>

      <div class="main-content">
        <div class="summary-row">
          <div class="summary-left">
            <input type="checkbox" class="summary-checkbox" />
            <span class="summary-text">
              <span id="count">0</span> of <span id="total-count">0</span> Vehicle(s)
            </span>
            <span class="badge-m2">M2</span>
        
            <!-- add here -->
            <div id="active-filters" class="active-filters-inline"></div>
          </div>
        </div>

        <div class="grid-wrapper">
          <div class="grid-inner">
            <div class="column-labels">
              <div class="header-cell header-checkbox"></div>
              <div class="header-cell header-status">Cat.</div>
              <div class="header-cell header-image">Image</div>
              <div class="header-cell header-model">Model</div>
              <div class="header-cell header-exterior">Exterior</div>
              <div class="header-cell header-interior">Interior</div>
              <div class="header-cell header-year">Year</div>
              <div class="header-cell header-vin">VIN</div>
              <div class="header-cell header-packages">Packages(Destination Charge: $995)</div>
              <div class="header-cell header-msrp">MSRP</div>
              <div class="header-cell header-dealer">Dealer Name</div>
            </div>

            <div class="table-header">
              <div class="header-cell header-checkbox"></div>
              <div class="header-cell header-status"></div>
              <div class="header-cell header-image"></div>

              <div class="header-cell header-model">
                <input class="filter-input" data-field="model" placeholder="Filter..." />
              </div>
              <div class="header-cell header-exterior">
                <input class="filter-input" data-field="exterior" placeholder="Filter..." />
              </div>
              <div class="header-cell header-interior">
                <input class="filter-input" data-field="interior" placeholder="Filter..." />
              </div>
              <div class="header-cell header-year">
                <input class="filter-input" data-field="year" placeholder="Filter..." />
              </div>
              <div class="header-cell header-vin">
                <input class="filter-input" data-field="vin" placeholder="Filter..." />
              </div>
              <div class="header-cell header-packages">
                <input class="filter-input" data-field="packages" placeholder="Filter..." />
              </div>
              <div class="header-cell header-msrp">
                <input class="filter-input" data-field="msrp" placeholder="Filter..." />
              </div>
              <div class="header-cell header-dealer">
                <input class="filter-input" data-field="dealer" placeholder="Filter..." />
              </div>
            </div>

            <div id="table-rows">
              <div class="loading">
                <div class="loading-spinner"></div>
                <div>Loading vehicle data...</div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="selection-count" id="selection-count">
    <span id="selection-count-text">0 Selected</span>
  </div>

  <div class="side-panel" id="side-panel">
    <div class="side-panel-header">
      <div class="side-panel-header-top">
        <div class="side-panel-title">1 Selected</div>
        <button class="side-panel-close" onclick="closeSidePanel()">✕</button>
      </div>
      <div class="side-panel-vehicle-name" id="panel-vehicle-name">-</div>
      <div class="side-panel-vehicle-info" id="panel-vehicle-info">-</div>
    </div>
    <div class="side-panel-divider">
      <span class="side-panel-divider-arrow">▼</span>
    </div>
    <div class="side-panel-menu">
      <div class="side-panel-menu-grid">
        <div class="side-panel-menu-item" onclick="handleDetailsClick()">
          <span class="side-panel-menu-icon">☰</span>
          <span class="side-panel-menu-text">Details</span>
        </div>
        <div class="side-panel-menu-item" onclick="handleVSpecClick()">
          <span class="side-panel-menu-icon">📋</span>
          <span class="side-panel-menu-text">V-Spec</span>
        </div>
        <div class="side-panel-menu-item" onclick="handleStickerClick()">
          <span class="side-panel-menu-icon">🏷️</span>
          <span class="side-panel-menu-text">Sticker</span>
        </div>
        <div class="side-panel-menu-item" onclick="handleInvoiceClick()">
          <span class="side-panel-menu-icon">📄</span>
          <span class="side-panel-menu-text">Invoice</span>
        </div>
      </div>
    </div>
  </div>

  <script>
    const colorLookup = {};
    const interiorLookup = {};
    const packageLookup = {};
    let currentCsvFile = "2016 F87 M2.csv";

    const defaultColors = {
      "300": { rgb: "255, 255, 255", name: "Alpine White", image: "https://github.com/Sman19/F87-M2-Ext-Int/blob/62fa3456fbd19b97c9772c0307a30f3c656ae3c9/2017_M2_Alpine_White_380x260.png?raw=true" },
      "475": { rgb: "0, 0, 0", name: "Black Sapphire Metallic", image: "https://github.com/Sman19/F87-M2-Ext-Int/blob/62fa3456fbd19b97c9772c0307a30f3c656ae3c9/2017_M2_Black_Sapphire_380x260.png?raw=true" },
      "C16": { rgb: "3,137,197", name: "Long Beach Blue", image: "https://github.com/Sman19/F87-M2-Ext-Int/blob/62fa3456fbd19b97c9772c0307a30f3c656ae3c9/2017_M2_Long_Beach_Blue_380x260.png?raw=true" },
      "B39": { rgb: "105,116,137", name: "Mineral Gray Metallic", image: "https://github.com/Sman19/F87-M2-Ext-Int/blob/c3be7f7ddc554a924c667c73698c21a2c7a04a75/2017_M2_Mineral_Grey_380x260.png?raw=true" },
      "B67": { rgb: "234,217,86", name: "Austin Yellow Metallic", image: "https://github.com/Sman19/F87-M2-Ext-Int/blob/c3be7f7ddc554a924c667c73698c21a2c7a04a75/Austin%20Yellow%20Metallic_380x260.png?raw=true" }
    };

    const defaultInteriors = {
      "LCNL": {
        image: "https://raw.githubusercontent.com/Sman19/F87-M2-Ext-Int/07ab816750f6763c0491ee47bf25568a7bb2a11f/m2%20interior%20Blue%20Stit.png",
        description: "Black Dakota Leather w. Blue Stitch"
      },
      "Z1XX": {
        image: "https://raw.githubusercontent.com/Sman19/F87-M2-Ext-Int/c3be7f7ddc554a924c667c73698c21a2c7a04a75/Austin%20yellow%20stitch.png",
        description: "Black Dakota Leather w. Yellow Stitch"
      }
    };

    const defaultPackages = {
      "IND": "BMW Individual (Paint) - $5,000.00"
    };

    const fieldSelectors = {
      model: ".cell-model",
      exterior: ".cell-exterior",
      interior: ".cell-interior",
      year: ".cell-year",
      vin: ".cell-vin",
      packages: ".cell-packages",
      msrp: ".cell-msrp",
      dealer: ".cell-dealer",
    };

    function normalize(text) {
      return (text || "").toLowerCase().trim();
    }

    function debounce(func, wait) {
      let timeout;
      return function (...args) {
        clearTimeout(timeout);
        timeout = setTimeout(() => func(...args), wait);
      };
    }

    function getCsvFileFromUrl() {
      const params = new URLSearchParams(window.location.search);
      return params.get("file") || "2016 F87 M2.csv";
    }

    function syncDatasetDropdown() {
      const select = document.getElementById("dataset-select");
      if (select) {
        select.value = currentCsvFile;
      }
    }

    function handleDatasetChange(fileName) {
      const url = new URL(window.location.href);
      url.searchParams.set("file", fileName);
      window.location.href = url.toString();
    }

    function toggleSidebar() {
      const sidebar = document.getElementById("left-sidebar");
      const toggle = document.getElementById("sidebar-toggle");

      if (!sidebar || !toggle) return;

      sidebar.classList.toggle("collapsed");

      if (sidebar.classList.contains("collapsed")) {
        toggle.textContent = "▶";
        toggle.title = "Show filters";
      } else {
        toggle.textContent = "◀";
        toggle.title = "Hide filters";
      }
    }

    function updateAuthUser() {
      const el = document.getElementById("auth-username");
      if (!el) return;

      if (typeof login !== "undefined" && login) {
        el.textContent = login;
      } else {
        el.textContent = "Member";
      }
    }

    function toggleUserMenu() {
      const dropdown = document.getElementById("user-menu-dropdown");
      if (!dropdown) return;
      dropdown.classList.toggle("open");
    }

    document.addEventListener("click", function (event) {
      const menu = document.getElementById("user-menu");
      const dropdown = document.getElementById("user-menu-dropdown");
      if (!menu || !dropdown) return;

      if (!menu.contains(event.target)) {
        dropdown.classList.remove("open");
      }
    });

    function applyFilters() {
  const rows = document.querySelectorAll("#table-rows .table-row");
  const inputs = document.querySelectorAll(".filter-input");
  const activeFiltersContainer = document.getElementById("active-filters");

  const filters = {};
  if (activeFiltersContainer) activeFiltersContainer.innerHTML = "";

  inputs.forEach((input) => {
    const field = input.dataset.field;
    const value = (input.value || "").trim();
    if (value) filters[field] = value;
  });

  const fieldLabels = {
    model: "Model",
    exterior: "Exterior",
    interior: "Interior",
    year: "Year",
    vin: "VIN",
    packages: "Packages",
    msrp: "MSRP",
    dealer: "Dealer"
  };

  const filterKeys = Object.keys(filters);

  if (activeFiltersContainer && filterKeys.length > 0) {
    filterKeys.forEach((field) => {
      const value = filters[field];

      const chip = document.createElement("div");
      chip.className = "filter-chip";
      chip.innerHTML = `
        ${fieldLabels[field] || field}: ${value}
        <span class="filter-chip-remove" data-field="${field}">✕</span>
      `;
      activeFiltersContainer.appendChild(chip);
    });

    const clearBtn = document.createElement("button");
    clearBtn.className = "clear-filters-btn";
    clearBtn.type = "button";
    clearBtn.textContent = "Clear All";
    clearBtn.onclick = clearAllFilters;
    activeFiltersContainer.appendChild(clearBtn);
  }

  let visibleCount = 0;

  rows.forEach((row) => {
    let visible = true;

    for (const field in filters) {
      const selector = fieldSelectors[field];
      if (!selector) continue;

      const cell = row.querySelector(selector);
      const cellText = normalize(cell ? cell.innerText : "");
      const rawFilter = filters[field];

      const parts = rawFilter
        .split(",")
        .map((p) => p.trim())
        .filter(Boolean);

      for (const part of parts) {
        if (/^-\s*/.test(part)) {
          const excludeTerm = normalize(part.replace(/^-\s*/, ""));
          if (excludeTerm && cellText.includes(excludeTerm)) {
            visible = false;
            break;
          }
        } else {
          const includeTerm = normalize(part);
          if (includeTerm && !cellText.includes(includeTerm)) {
            visible = false;
            break;
          }
        }
      }

      if (!visible) break;
    }

    row.style.display = visible ? "flex" : "none";
    if (visible) visibleCount++;
  });

  document.getElementById("count").textContent = visibleCount;
}

function clearAllFilters() {
  document.querySelectorAll(".filter-input").forEach((input) => {
    input.value = "";
  });
  applyFilters();
}

document.addEventListener("click", function (e) {
  if (e.target.matches(".filter-chip-remove")) {
    const field = e.target.dataset.field;
    const input = document.querySelector(`.filter-input[data-field="${field}"]`);
    if (input) {
      input.value = "";
      applyFilters();
    }
  }
});    

    function setupFilterInputs() {
      const debouncedFilter = debounce(applyFilters, 300);
      document.querySelectorAll(".filter-input").forEach((input) => {
        input.addEventListener("input", debouncedFilter);
      });
    }

    function initCopyButtons() {
      document.querySelectorAll(".copy-btn").forEach((btn) => {
        btn.onclick = () => {
          const id = btn.dataset.copyTarget;
          const el = document.getElementById(id);
          if (!el) return;
          const text = el.textContent.trim();

          if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(text).then(() => {
              btn.classList.add("copied");
              btn.textContent = "✓";
              setTimeout(() => {
                btn.classList.remove("copied");
                btn.textContent = "⧉";
              }, 700);
            });
          }
        };
      });
    }

    function parseCSVLine(line) {
      const result = [];
      let current = "";
      let inQuotes = false;

      for (let i = 0; i < line.length; i++) {
        const char = line[i];
        const nextChar = line[i + 1];

        if (char === '"') {
          if (inQuotes && nextChar === '"') {
            current += '"';
            i++;
          } else {
            inQuotes = !inQuotes;
          }
        } else if (char === "," && !inQuotes) {
          result.push(current.trim());
          current = "";
        } else {
          current += char;
        }
      }

      result.push(current.trim());
      return result;
    }

    function extractPaintCode(exteriorStr) {
      if (!exteriorStr) return "";
      const raw = exteriorStr.replace(/\s+/g, " ").trim().toUpperCase();

      const dashMatch = raw.match(/^([A-Z0-9]{3,4})\s*-\s*/);
      if (dashMatch) return dashMatch[1];

      const spaceMatch = raw.match(/^([A-Z0-9]{3,4})\s+/);
      if (spaceMatch) return spaceMatch[1];

      return "";
    }

    function extractInteriorCode(interiorStr) {
      if (!interiorStr) return "";
      const raw = interiorStr.replace(/\s+/g, " ").trim();
      const upper = raw.toUpperCase();

      if (/^[A-Z0-9]{3,6}$/.test(upper)) return upper;

      const dashMatch = raw.match(/^([A-Z0-9]+)\s*-\s*/i);
      if (dashMatch) return dashMatch[1].trim().toUpperCase();

      const spaceMatch = raw.match(/^([A-Z0-9]{3,6})\s+/i);
      if (spaceMatch) return spaceMatch[1].trim().toUpperCase();

      const low = raw.toLowerCase();
      if (low.includes("fox red") && low.includes("extended")) return "NDH2";
      if (low.includes("fox red")) return "NCH2";
      if (low.includes("rust brown")) return "ZAP2";

      return "";
    }

    function looksLikeSectionHeader(text, expected) {
      return normalize(text) === normalize(expected);
    }

    async function loadReferenceData() {
      Object.keys(colorLookup).forEach(k => delete colorLookup[k]);
      Object.keys(interiorLookup).forEach(k => delete interiorLookup[k]);
      Object.keys(packageLookup).forEach(k => delete packageLookup[k]);

      try {
        const response = await fetch(currentCsvFile);
        if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);

        const csvText = await response.text();
        const lines = csvText.trim().split(/\r?\n/);

        let currentSection = "";

        for (let i = 0; i < lines.length; i++) {
          const cols = parseCSVLine(lines[i]);

          if (cols[2] && cols[3] && looksLikeSectionHeader(cols[2], "Paint Code") && looksLikeSectionHeader(cols[3], "Paint Name")) {
            currentSection = "exterior";
            continue;
          }
          if (cols[2] && looksLikeSectionHeader(cols[2], "INTERIOR Code")) {
            currentSection = "interior";
            continue;
          }
          if (cols[2] && (looksLikeSectionHeader(cols[2], "Packages") || looksLikeSectionHeader(cols[2], "PACKAGES"))) {
            currentSection = "packages";
            continue;
          }

          if (cols.every((c) => !c || !c.trim())) continue;

          if (currentSection === "exterior" && cols[2] && cols[2].trim()) {
            const paintCode = cols[2].trim().toUpperCase();
            if (paintCode && paintCode !== "PAINT CODE") {
              colorLookup[paintCode] = {
                rgb: cols[4] ? cols[4].trim() : "128,128,128",
                name: cols[3] ? cols[3].trim() : "",
                image: cols[5] ? cols[5].trim() : "",
              };
            }
          }

          if (currentSection === "interior" && cols[2] && cols[2].trim()) {
            const interiorCode = cols[2].trim().toUpperCase();
            if (interiorCode && interiorCode !== "INTERIOR CODE") {
              interiorLookup[interiorCode] = {
                image: cols[5] ? cols[5].trim() : "",
                description: cols[4] ? cols[4].trim() : "",
              };
            }
          }

          if (currentSection === "packages" && cols[2] && cols[2].trim()) {
            const packageCode = cols[2].trim().toUpperCase();
            if (packageCode && packageCode !== "PACKAGES" && cols[3]) {
              let cleanDesc = cols[3].trim();
              cleanDesc = cleanDesc.replace(/^["'\s]+|["'\s]+$/g, "");
              cleanDesc = cleanDesc.replace(/\s+/g, " ");
              if (cleanDesc) packageLookup[packageCode] = cleanDesc;
            }
          }
        }
      } catch (err) {
        console.error(`Error loading reference data from ${currentCsvFile}:`, err);
      }

      if (Object.keys(colorLookup).length === 0) Object.assign(colorLookup, defaultColors);
      if (Object.keys(interiorLookup).length === 0) Object.assign(interiorLookup, defaultInteriors);
      Object.assign(packageLookup, defaultPackages, packageLookup);
    }

    async function loadCSV() {
      currentCsvFile = getCsvFileFromUrl();
      syncDatasetDropdown();
      await loadReferenceData();

      try {
        const response = await fetch(currentCsvFile);
        if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);

        const csvText = await response.text();
        const lines = csvText.trim().split(/\r?\n/);
        if (!lines.length) throw new Error("CSV file is empty");

        const vehicles = [];

        for (let i = 1; i < lines.length; i++) {
          if (!lines[i].trim()) continue;

          const cols = parseCSVLine(lines[i]);
          const vin = cols[4] ? cols[4].trim() : "";

          if (vin && /^WBS/i.test(vin)) {
            const basePackages = (cols[7] || "").trim();
            const transmission2MK = (cols[12] || "").trim();

            const combinedPackages = [basePackages];
            if (transmission2MK.toUpperCase() === "2MK") {
              combinedPackages.push("2MK");
            }

            vehicles.push({
              exterior: cols[0] || "",
              interior: cols[2] || "",
              year: cols[1] || "",
              vin: cols[4] || "",
              model: "F87",
              packages: combinedPackages.filter(Boolean).join(", "),
              msrp: cols[8] || "",
              dealer: cols[13] || "",
              details: "",
              vspec: "",
              sticker: "",
              invoice: "",
            });
          }
        }

        document.getElementById("count").textContent = vehicles.length;
        document.getElementById("total-count").textContent = vehicles.length;

        const table = document.getElementById("table-rows");
        table.innerHTML = "";

        vehicles.forEach((vehicle, index) => {
          const row = document.createElement("div");
          row.className = "table-row";

          const paintCode = extractPaintCode(vehicle.exterior);
          const interiorCode = extractInteriorCode(vehicle.interior);

          const colorData = colorLookup[paintCode] || { rgb: "128,128,128", name: "Unknown" };
          const interiorData = interiorLookup[interiorCode] || { image: "", description: "Unknown" };
          const exteriorImage = colorData.image || "";
          const modelCode = "F87";

          const packageSet = new Set();

          if (vehicle.packages) {
            vehicle.packages
              .split(",")
              .map((p) => p.trim())
              .filter((p) => p.length > 0)
              .forEach((p) => packageSet.add(p.toUpperCase()));
          }

          const packageCodes = Array.from(packageSet);
          const packageDisplay = packageCodes.length > 0 ? packageCodes.join(", ") : "-";

          const packageDetails = packageCodes
            .map((code) => {
              const codeUpper = code.trim().toUpperCase();
              if (codeUpper === "2MK") {
                return `<div><strong>2MK:</strong> M Double-clutch Transmission</div>`;
              }
              const pkg = packageLookup[codeUpper];
              return pkg
                ? `<div><strong>${codeUpper}:</strong> ${pkg}</div>`
                : `<div><strong>${codeUpper}</strong> (not found in lookup)</div>`;
            })
            .join("");

          row.innerHTML = `
            <div class="cell cell-checkbox"><input type="checkbox"></div>
            <div class="cell cell-status"><div class="status-circle">G</div></div>
            <div class="cell cell-image">
              ${exteriorImage ? `<img src="${exteriorImage}" class="exterior-thumbnail" alt="${vehicle.exterior}">` : `<div class="exterior-thumbnail"></div>`}
            </div>
            <div class="cell cell-model"><span class="model-code">${modelCode}</span></div>
            <div class="cell cell-exterior">
              <div class="tooltip">
                <div class="color-display">
                  <span class="color-circle" style="background-color: rgb(${colorData.rgb})"></span>
                  <span>${vehicle.exterior}</span>
                </div>
                <div class="tooltiptext tooltip-red-content">${vehicle.exterior}<br>RGB: ${colorData.rgb}</div>
              </div>
            </div>
            <div class="cell cell-interior">
              <div class="tooltip">
                <div class="interior-display">
                  ${
                    interiorData.image
                      ? `<span class="interior-square" style="background-image: url('${interiorData.image}')"></span>`
                      : `<span class="interior-square" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%)"></span>`
                  }
                  <span>${vehicle.interior}</span>
                </div>
                <div class="tooltiptext tooltip-red-content">${vehicle.interior}</div>
              </div>
            </div>
            <div class="cell cell-year">${vehicle.year}</div>
            <div class="cell cell-vin">
              <div class="tooltip">
                <span class="vin-text" id="vin-${index}">${vehicle.vin}</span>
                <div class="tooltiptext tooltip-red-content">${vehicle.vin}</div>
              </div>
              <button class="copy-btn" data-copy-target="vin-${index}" title="Copy VIN">⧉</button>
            </div>
            <div class="cell cell-packages">
              <div class="tooltip">
                <span class="packages-short">${packageDisplay}</span>
                ${
                  packageDetails
                    ? `<div class="tooltiptext tooltip-packages"><strong>Package Details:</strong><br>${packageDetails}</div>`
                    : ""
                }
              </div>
            </div>
            <div class="cell cell-msrp">${vehicle.msrp || "-"}</div>
            <div class="cell cell-dealer">
              <div class="tooltip">
                <span>${vehicle.dealer || "-"}</span>
                ${vehicle.dealer ? `<div class="tooltiptext tooltip-red-content">${vehicle.dealer}</div>` : ""}
              </div>
            </div>
          `;

          table.appendChild(row);

          const checkbox = row.querySelector('input[type="checkbox"]');
          checkbox.addEventListener("change", function () {
            handleCheckboxChange(this, vehicle);
          });
        });

        initCopyButtons();
        applyFilters();
      } catch (err) {
        console.error("Error loading CSV:", err);
        document.getElementById("table-rows").innerHTML = `
          <div style="padding: 40px; text-align: center; color: #dc3545;">
            <h3>⚠️ Error Loading Data</h3>
            <p>${err.message}</p>
            <p>Please ensure the selected CSV file is in the same directory as this HTML file.</p>
          </div>
        `;
      }
    }

    let selectedVehicles = new Set();

    function updateSelectionCount() {
      const count = selectedVehicles.size;
      const counter = document.getElementById("selection-count");
      const text = document.getElementById("selection-count-text");

      if (count > 0) {
        text.textContent = `${count} Selected`;
        counter.classList.add("visible");
      } else {
        counter.classList.remove("visible");
        closeSidePanel();
      }
    }

    function handleCheckboxChange(checkbox, vehicleInfo) {
      const row = checkbox.closest(".table-row");

      if (checkbox.checked) {
        selectedVehicles.add(vehicleInfo.vin);
        row.classList.add("selected");
        openSidePanel(vehicleInfo);
      } else {
        selectedVehicles.delete(vehicleInfo.vin);
        row.classList.remove("selected");
      }

      updateSelectionCount();
    }

    function openSidePanel(vehicleInfo) {
      const panel = document.getElementById("side-panel");
      const vehicleName = document.getElementById("panel-vehicle-name");
      const vehicleInfoEl = document.getElementById("panel-vehicle-info");

      vehicleName.textContent = "F87 M2";
      vehicleInfoEl.textContent = vehicleInfo.vin || "Unknown VIN";

      panel.dataset.currentVin = vehicleInfo.vin || "";
      panel.dataset.currentDetails = vehicleInfo.details || "";
      panel.dataset.currentVspec = vehicleInfo.vspec || "";
      panel.dataset.currentSticker = vehicleInfo.sticker || "";
      panel.dataset.currentInvoice = vehicleInfo.invoice || "";

      panel.classList.add("open");
    }

    function closeSidePanel() {
      document.getElementById("side-panel").classList.remove("open");
    }

    function toRawGithub(url) {
      let u = (url || "").trim();
      if (u.includes("github.com") && !u.includes("/raw/")) u = u.replace("/blob/", "/raw/");
      return u;
    }

    function handleDetailsClick() {
      const panel = document.getElementById("side-panel");
      const url = toRawGithub(panel.dataset.currentDetails);
      const vin = panel.dataset.currentVin;
      if (!vin) return alert("No vehicle selected");
      if (!url) return alert(`Details PDF not available for VIN: ${vin}`);
      window.open(url, "_blank");
    }

    function handleVSpecClick() {
      const panel = document.getElementById("side-panel");
      const url = toRawGithub(panel.dataset.currentVspec);
      const vin = panel.dataset.currentVin;
      if (!vin) return alert("No vehicle selected");
      if (!url) return alert(`V-Spec PDF not available for VIN: ${vin}`);
      window.open(url, "_blank");
    }

    function handleStickerClick() {
      const panel = document.getElementById("side-panel");
      const url = toRawGithub(panel.dataset.currentSticker);
      const vin = panel.dataset.currentVin;
      if (!vin) return alert("No vehicle selected");
      if (!url) return alert(`Window Sticker PDF not available for VIN: ${vin}`);
      window.open(url, "_blank");
    }

    function handleInvoiceClick() {
      const panel = document.getElementById("side-panel");
      const url = toRawGithub(panel.dataset.currentInvoice);
      const vin = panel.dataset.currentVin;
      if (!vin) return alert("No vehicle selected");
      if (!url) return alert(`Invoice PDF not available for VIN: ${vin}`);
      window.open(url, "_blank");
    }

    document.addEventListener("DOMContentLoaded", () => {
      updateAuthUser();
      setupFilterInputs();

      let attempts = 0;
      const maxAttempts = 10;

      const waitForAuthThenLoad = () => {
        attempts++;

        if (typeof login !== "undefined") {
          loadCSV();
          return;
        }

        if (attempts < maxAttempts) {
          setTimeout(waitForAuthThenLoad, 300);
        } else {
          loadCSV();
        }
      };

      waitForAuthThenLoad();
    });
  </script>

  <script>
    (() => {
      const favicon = document.getElementById("favicon");
      if (!favicon) return;

      const img = new Image();
      img.crossOrigin = "anonymous";
      img.src =
        "https://raw.githubusercontent.com/Sman19/Functioning-Website/ac241a80e9369136c2629f014a56dfff7f28fa03/carbo-insta_1080x1080%20Favicon.png";

      const size = 64;
      const canvas = document.createElement("canvas");
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext("2d");

      let angle = 0;

      img.onload = () => {
        setInterval(() => {
          ctx.clearRect(0, 0, size, size);

          ctx.beginPath();
          ctx.arc(size / 2, size / 2, size / 2, 0, Math.PI * 2);
          ctx.fillStyle = "#000000";
          ctx.fill();

          ctx.drawImage(img, 0, 0, size, size);

          ctx.save();
          ctx.translate(size / 2, size / 2);
          ctx.rotate(angle);

          const gradient = ctx.createConicGradient(0, 0, 0);
          gradient.addColorStop(0.0, "#ff0000");
          gradient.addColorStop(0.16, "#ff9900");
          gradient.addColorStop(0.33, "#ffff00");
          gradient.addColorStop(0.5, "#00ff00");
          gradient.addColorStop(0.66, "#00ffff");
          gradient.addColorStop(0.83, "#0066ff");
          gradient.addColorStop(1.0, "#ff00ff");

          ctx.beginPath();
          ctx.arc(0, 0, 26, 0, Math.PI * 2);
          ctx.lineWidth = 4;
          ctx.strokeStyle = gradient;
          ctx.stroke();

          ctx.restore();

          favicon.href = canvas.toDataURL("image/png");
          angle += 0.08;
        }, 120);
      };
    })();
  </script>
