<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CarboiCreations Database Login</title>
</head>
<body>

<div id="ap_style" class="ap_class limiter">

  <style>
    #ap_style { 
      --ap-backcol: #E6E6E6;
      --ap-formcol: #FFFFFF;
      --ap-forecol: #333333;
      --ap-headcol: #FFFFFF;
      --ap-linkcol: #0000FF;
      --ap-errcolor: #FF0000;
      --ap-bdcolor: #000F91;
      --ap-bdwidth: 1px;
      --ap-fontsize: 14px;
      --ap-fontsizew: normal;
      --ap-fontsizei: normal;
      --ap-fontsizec: none;
      --ap-fontsizeh: 14px;
      --ap-fontsizehw: bold;
      --ap-fontsizehi: normal;
      --ap-fontsizehc: none;
      --ap-fontface: verdana, arial;
      --ap-headuc: none;
    }
  </style>

  <style>
    @import "https://authpro.com/templ/3.css?230705";
  </style>

  <div class="container-apform">
    <div class="wrap-apform" id="ap_form_box">
      <div class="apform-form-title">
        <span class="apform-form-title-1" id="ap_form_head">CarboiCreations Database Login</span>
      </div>
      <br id="ap_hbr">

      <form method="post" action="https://www.authpro.com/auth/sman201/" name="aform" target="_top">
        <input type="hidden" name="action" value="login">
        <input type="hidden" name="user" value="sman201">
        <input type="hidden" name="remember_func" value="">
        <input type="hidden" name="hide" value="O">

        <table id="ap_table_login" class="center">
          <tr style="display:none" id="ap_form_err">
            <td colspan="2" id="ap_form_errmes" class="error"></td>
          </tr>

          <tr style="display:none" id="ap_form_inf">
            <td colspan="2" id="ap_form_infmes"></td>
          </tr>

          <tr class="ap_form_inp">
            <td>Username:</td>
            <td>
              <input type="text" name="login" value="" autocorrect="off" autocapitalize="off" autocomplete="username">
            </td>
          </tr>

          <tr class="ap_form_inp">
            <td>Password:</td>
            <td>
              <input type="password" name="password" autocomplete="current-password">
            </td>
          </tr>

          <tr>
            <td>&nbsp;</td>
            <td align="left">
              <input type="checkbox" name="remember" value="1"> Remember me
            </td>
          </tr>

          <tr id="ap_form_isb">
            <td>&nbsp;</td>
            <td>
              <input type="submit" id="ap_form_btn" value="Login">
            </td>
          </tr>

          <tr id="ap_form_space">
            <td colspan="2">&nbsp;</td>
          </tr>

          <tr>
            <td colspan="2" id="ap_form_lostmes">
              <a href="https://www.authpro.com/auth/sman201/?action=lost">Forgot your username or password?</a>
            </td>
          </tr>

          <tr>
            <td colspan="2" id="ap_form_regmes">
              Need access? Click <a href="https://www.authpro.com/auth/sman201/?action=reg">here</a> to register.
            </td>
          </tr>
        </table>
      </form>

      <script type="text/javascript" src="https://www.authpro.com/js/aform.js?1711251"></script>
    </div>
  </div>
</div>

</body>
</html>
