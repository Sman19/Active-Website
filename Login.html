<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>CarboiCreations Database Login</title>

  <link
    rel="icon"
    type="image/png"
    href="carbo-insta_1080x1080 Favicon.png"
  />

  <link
    rel="preload"
    as="image"
    href="crtrep login.png"
  />

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      overscroll-behavior: none;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      position: fixed;
      inset: 0;
      background:
        linear-gradient(rgba(0, 0, 0, 0.16), rgba(0, 0, 0, 0.16)),
        url("crtrep login.png") no-repeat center center / cover;
      -webkit-text-size-adjust: 100%;
    }

    .top-strip {
      position: absolute;
      top: 8px;
      left: 8px;
      right: 8px;
      height: 92px;
      background: rgba(0, 0, 0, 0.78);
      border-bottom: 1px solid rgba(255, 255, 255, 0.18);
      z-index: 1;
    }

    .top-logo {
      position: absolute;
      top: 30px;
      left: 42px;
      width: 58px;
      height: 58px;
      object-fit: contain;
      z-index: 2;
    }

    .login-stage {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding-top: 98px;
      z-index: 3;
      touch-action: manipulation;
    }

    .login-card {
      width: 325px;
      background: #efefef;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 12px 34px rgba(0, 0, 0, 0.24);
    }

    .login-header {
      background: rgba(30, 33, 38, 0.96);
      color: #ffffff;
      text-align: center;
      font-size: 15px;
      font-weight: 700;
      padding: 12px 14px;
      letter-spacing: 0.3px;
    }

    .login-body {
      padding: 20px 14px 8px;
    }

    .login-row {
      display: grid;
      grid-template-columns: 102px 1fr;
      align-items: center;
      column-gap: 12px;
      margin-bottom: 8px;
    }

    .login-label {
      font-size: 16px;
      color: #2f2f2f;
      text-align: left;
      white-space: nowrap;
    }

    .login-input {
      width: 100%;
      height: 54px;
      background: #d8dee9;
      border: none;
      border-bottom: 2px solid #7a7a7a;
      padding: 0 10px;
      font-size: 15px;
      color: #222;
      outline: none;
      border-radius: 0;
      appearance: none;
      -webkit-appearance: none;
    }

    .login-input:focus {
      border-bottom-color: #0a1ea8;
    }

    .remember-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 10px 0 16px 114px;
      font-size: 15px;
      color: #2f2f2f;
    }

    .remember-row input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: #0a1ea8;
    }

    .button-wrap {
      margin-left: 106px;
      margin-bottom: 14px;
    }

    .login-button {
      width: 175px;
      height: 48px;
      border: none;
      border-radius: 17px;
      background: rgba(25, 27, 31, 0.96);
      color: #ffffff;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      text-transform: uppercase;
      appearance: none;
      -webkit-appearance: none;
    }

    .login-button:hover {
      background: #08157a;
    }

    .login-links {
      padding: 0 14px 14px;
      font-size: 14px;
      line-height: 1.35;
    }

    .login-links p {
      margin-bottom: 9px;
      color: #2f2f2f;
    }

    .login-links a {
      color: #001dff;
      text-decoration: underline;
    }

    .error-message {
      display: none;
      padding: 14px 14px 0;
      color: #d71920;
      font-size: 14px;
      font-weight: 700;
    }

    .info-message {
      display: none;
      padding: 14px 14px 0;
      color: #333;
      font-size: 14px;
      font-weight: 700;
    }

    .bumper-text {
      position: absolute;
      left: 50%;
      bottom: 242px;
      transform: translateX(-50%);
      color: rgba(255, 255, 255, 0.62);
      font-size: 15px;
      font-weight: 500;
      letter-spacing: 0.15px;
      z-index: 2;
      pointer-events: none;
      text-shadow: 0 1px 2px rgba(0, 0, 0, 0.18);
      white-space: nowrap;
    }

    @media (max-width: 600px) {
      .top-strip {
        height: 74px;
      }

      .top-logo {
        top: 20px;
        left: 22px;
        width: 48px;
        height: 48px;
      }

      .login-stage {
        padding-top: 88px;
        padding-left: 16px;
        padding-right: 16px;
        padding-bottom: 20px;
      }

      .login-card {
        width: 92vw;
        max-width: 325px;
      }

      .login-row {
        grid-template-columns: 1fr;
        row-gap: 6px;
      }

      .remember-row,
      .button-wrap {
        margin-left: 0;
      }

      .login-button {
        width: 100%;
      }

      .login-input {
        font-size: 16px;
      }

      .bumper-text {
        bottom: 198px;
        font-size: 13px;
      }
    }

    /* iPhone / iPad tweaks */
    @media (max-width: 600px) {
      .ios-device .login-stage {
        padding-top: 78px;
      }

      .ios-device .login-card {
        max-width: 250px;
      }

      .ios-device .login-input {
        font-size: 16px;
      }

      .ios-device .login-label {
        font-size: 15px;
      }

      .ios-device .remember-row {
        font-size: 14px;
      }

      .ios-device .login-links {
        font-size: 13px;
      }

      .ios-device .top-logo {
        width: 44px;
        height: 44px;
      }

      .ios-device .bumper-text {
        bottom: 188px;
        font-size: 12px;
      }
    }

    /* Android tweaks */
    @media (max-width: 600px) {
      .android-device .login-stage {
        padding-top: 84px;
      }

      .android-device .login-card {
        max-width: 250px;
      }

      .android-device .login-input {
        font-size: 16px;
      }

      .android-device .login-label {
        font-size: 15px;
      }

      .android-device .remember-row {
        font-size: 14px;
      }

      .android-device .login-links {
        font-size: 13px;
      }

      .android-device .bumper-text {
        bottom: 192px;
        font-size: 12px;
      }
    }
  </style>
</head>
<body>
  <div class="top-strip"></div>

  <img
    class="top-logo"
    src="carbo-insta_1080x1080 Favicon.png"
    alt="CarboiCreations"
  />

  <div class="bumper-text">Presented by CARBOI-CREATIONS</div>

  <div class="login-stage">
    <div class="login-card">
      <div class="login-header">BMW M Archiv</div>

      <div id="ap_form_errmes" class="error-message"></div>
      <div id="ap_form_infmes" class="info-message"></div>

      <form method="post" action="https://www.authpro.com/auth/sman201/" name="aform" target="_top">
        <input type="hidden" name="action" value="login">
        <input type="hidden" name="user" value="sman201">
        <input type="hidden" name="remember_func" value="">
        <input type="hidden" name="hide" value="O">

        <div class="login-body">
          <div class="login-row">
            <label class="login-label" for="login">Username:</label>
            <input
              class="login-input"
              id="login"
              type="text"
              name="login"
              value=""
              autocorrect="off"
              autocapitalize="off"
              autocomplete="username"
            >
          </div>

          <div class="login-row">
            <label class="login-label" for="password">Password:</label>
            <input
              class="login-input"
              id="password"
              type="password"
              name="password"
              autocomplete="current-password"
            >
          </div>

          <div class="remember-row">
            <input type="checkbox" id="remember" name="remember" value="1">
            <label for="remember">Remember me</label>
          </div>

          <div class="button-wrap">
            <input class="login-button" type="submit" value="LOGIN">
          </div>
        </div>

        <div class="login-links">
          <p>
            <a href="https://www.authpro.com/auth/sman201/?action=lost">
              Forgot your username or password?
            </a>
          </p>

          <p>
            Not member yet? Click
            <a href="https://www.authpro.com/auth/sman201/?action=reg">here</a>
            to register.
          </p>
        </div>
      </form>
    </div>
  </div>

  <script type="text/javascript" src="https://www.authpro.com/js/aform.js?1711251"></script>
  <script>
    const ua = navigator.userAgent || navigator.vendor || window.opera;

    const isIOS =
      /iPad|iPhone|iPod/.test(ua) ||
      (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);

    const isAndroid = /Android/.test(ua);

    if (isIOS) document.documentElement.classList.add("ios-device");
    if (isAndroid) document.documentElement.classList.add("android-device");

    const errEl = document.getElementById("ap_form_errmes");
    const infoEl = document.getElementById("ap_form_infmes");

    const observer = new MutationObserver(() => {
      if (errEl.textContent.trim()) errEl.style.display = "block";
      if (infoEl.textContent.trim()) infoEl.style.display = "block";
    });

    observer.observe(errEl, { childList: true, subtree: true });
    observer.observe(infoEl, { childList: true, subtree: true });
  </script>
</body>
</html>
