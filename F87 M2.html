<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>F87 M2 Database</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family: Arial; margin:0; }
.sidebar { width:300px; float:left; padding:10px; background:#f3f4f6; height:100vh; }
.main { margin-left:300px; padding:10px; }
.row { display:flex; border-bottom:1px solid #ddd; padding:8px 0; }
.cell { flex:1; font-size:13px; }
.header { font-weight:bold; background:#eee; }
</style>
</head>

<body>

<div class="sidebar">
  <h3>Exterior Breakdown</h3>
  <canvas id="chart"></canvas>
</div>

<div class="main">
  <div id="count"></div>

  <div class="row header">
    <div class="cell">Model</div>
    <div class="cell">Exterior</div>
    <div class="cell">Interior</div>
    <div class="cell">Year</div>
    <div class="cell">VIN</div>
    <div class="cell">MSRP</div>
  </div>

  <div id="table"></div>
</div>

<script>
let vehicles = [];

fetch("2016 F87 M2.csv")
.then(res => res.text())
.then(data => {
  const rows = parseCSV(data);
  processCSV(rows);
});

function parseCSV(data) {
  const lines = data.split("\n");
  const headers = lines[0].split(",");
  return lines.slice(1).map(line => {
    const values = line.split(",");
    let obj = {};
    headers.forEach((h,i)=> obj[h.trim()] = (values[i]||"").trim());
    return obj;
  });
}

function processCSV(rows) {
  vehicles = [];

  let reachedEnd = false;

  rows.forEach(row => {
    const vin = (row["VIN"] || "").trim();

    // STOP after VIN section ends
    if (!vin) {
      reachedEnd = true;
      return;
    }

    if (reachedEnd) return;

    // VALID VIN ONLY
    if (!vin.match(/^[A-Z0-9]{10,}$/)) return;

    let msrp = (row["MSRP"] || "").trim();
    if (!msrp.includes("$")) msrp = "";

    vehicles.push({
      model: row["MODEL"] || "",
      exterior: row["EXTERIOR"] || "",
      interior: row["INTERIOR"] || "",
      year: row["YEAR"] || "",
      vin: vin,
      msrp: msrp
    });
  });

  render();
  buildChart();
}

function render() {
  const table = document.getElementById("table");
  table.innerHTML = "";

  vehicles.forEach(v => {
    const row = document.createElement("div");
    row.className = "row";

    row.innerHTML = `
      <div class="cell">${v.model}</div>
      <div class="cell">${v.exterior}</div>
      <div class="cell">${v.interior}</div>
      <div class="cell">${v.year}</div>
      <div class="cell">${v.vin}</div>
      <div class="cell">${v.msrp}</div>
    `;

    table.appendChild(row);
  });

  document.getElementById("count").innerText =
    vehicles.length + " Vehicles";
}

function buildChart() {
  const counts = {};

  vehicles.forEach(v => {
    const code = (v.exterior || "").split(" ")[0]; // gets 300, C16, etc
    if (!code) return;
    counts[code] = (counts[code] || 0) + 1;
  });

  const labels = Object.keys(counts);
  const data = Object.values(counts);

  new Chart(document.getElementById("chart"), {
    type: "pie",
    data: {
      labels: labels,
      datasets: [{ data: data }]
    }
  });
}
</script>

</body>
</html>
