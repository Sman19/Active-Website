<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>2017 F87 M2 Coupe Database</title>

  <link
    id="favicon"
    rel="icon"
    type="image/png"
    href="https://raw.githubusercontent.com/Sman19/Functioning-Website/ac241a80e9369136c2629f014a56dfff7f28fa03/carbo-insta_1080x1080%20Favicon.png"
  />

  <script type="text/javascript" src="https://www.authpro.com/auth/sman201/?action=pp"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #ffffff;
      font-size: 13px;
      color: #111827;
    }

    .app-shell { width: 100%; }

    .top-nav {
      height: 64px;
      background: #3b3f46;
      color: #ffffff;
      display: flex;
      align-items: center;
      padding: 0 32px;
      box-sizing: border-box;
    }

    .top-nav-left,
    .top-nav-center,
    .top-nav-right {
      display: flex;
      align-items: center;
    }

    .top-nav-left { flex: 1; }

    .top-nav-center {
      flex: 2;
      justify-content: center;
      gap: 8px;
      font-size: 16px;
    }

    .top-nav-right {
      flex: 1;
      justify-content: flex-end;
      gap: 8px;
    }

    .top-nav-home {
      font-size: 16px;
      color: #ffffff;
      text-decoration: none;
    }

    .top-nav-home:hover {
      text-decoration: underline;
    }

    .user-menu {
      position: relative;
    }

    .user-menu-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      background: transparent;
      border: none;
      color: #ffffff;
      cursor: pointer;
      font-size: 16px;
      padding: 6px 10px;
      border-radius: 6px;
    }

    .user-menu-btn:hover {
      background: rgba(255,255,255,0.08);
    }

    .user-menu-dropdown {
      position: absolute;
      right: 0;
      top: calc(100% + 8px);
      min-width: 160px;
      background: #ffffff;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.15);
      padding: 6px;
      display: none;
      z-index: 2000;
    }

    .user-menu-dropdown.open {
      display: block;
    }

    .user-menu-link {
      display: block;
      text-decoration: none;
      color: #111827;
      padding: 10px 12px;
      border-radius: 6px;
      font-size: 14px;
    }

    .user-menu-link:hover {
      background: #f3f4f6;
    }

    .owner-row {
      display: flex;
      align-items: center;
      padding: 20px 32px 8px;
      box-sizing: border-box;
      gap: 12px;
    }

    .owner-pill {
      width: 6px;
      height: 40px;
      border-radius: 999px;
      background: #e11d21;
    }

    .owner-labels {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .owner-main { font-size: 22px; }
    .owner-sub { font-size: 22px; color: #e11d21; }

    .page-layout {
      display: flex;
      width: 100%;
      min-height: calc(100vh - 64px);
    }

    .left-sidebar {
      width: 320px;
      min-width: 320px;
      background: #f3f4f6;
      border-right: 1px solid #d1d5db;
      padding: 18px 14px;
      position: relative;
      transition: width 0.25s ease, min-width 0.25s ease, padding 0.25s ease;
      overflow-y: auto;
      overflow-x: hidden;
    }

    .left-sidebar.collapsed {
      width: 44px;
      min-width: 44px;
      padding: 18px 6px;
      overflow: hidden;
    }

    .left-sidebar.collapsed .sidebar-content {
      display: none;
    }

    .sidebar-toggle {
      position: absolute;
      top: 14px;
      right: 8px;
      width: 28px;
      height: 28px;
      border: 1px solid #d1d5db;
      border-radius: 999px;
      background: #ffffff;
      color: #374151;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 700;
      z-index: 5;
    }

    .sidebar-toggle:hover {
      background: #e5e7eb;
    }

    .sidebar-section {
      margin-bottom: 18px;
    }

    .sidebar-title {
      font-size: 18px;
      font-weight: 700;
      color: #374151;
      margin-bottom: 16px;
    }

    .sidebar-label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      color: #4b5563;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 8px;
    }

    .sidebar-select {
      width: 100%;
      height: 38px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      background: #ffffff;
      color: #111827;
      font-size: 14px;
      padding: 0 10px;
      outline: none;
    }

    .sidebar-select:focus {
      border-color: #2563eb;
    }

    .sidebar-chart-card {
      background: #ffffff;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      padding: 10px;
    }

    .sidebar-chart-wrap {
      position: relative;
      width: 100%;
      height: 290px;
    }

    .main-content {
      flex: 1;
      min-width: 0;
    }

    .summary-row {
      padding: 8px 32px 8px;
      border-bottom: 1px solid #e5e7eb;
      box-sizing: border-box;
    }

    .summary-left {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .summary-checkbox { width: 16px; height: 16px; }
    .summary-text { font-size: 18px; }

    .badge-m2 {
      background: #007bff;
      color: #ffffff;
      padding: 2px 10px;
      border-radius: 4px;
      font-size: 14px;
    }

    .active-filters-inline {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      margin-left: 4px;
    }

    .filter-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: #111827;
      color: #fff;
      padding: 5px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 500;
      line-height: 1;
      white-space: nowrap;
    }

    .filter-chip-remove {
      cursor: pointer;
      font-weight: 700;
      opacity: 0.9;
    }

    .filter-chip-remove:hover {
      opacity: 1;
    }

    .clear-filters-btn {
      border: 1px solid #d1d5db;
      background: #ffffff;
      color: #111827;
      border-radius: 999px;
      padding: 5px 10px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      line-height: 1;
    }

    .clear-filters-btn:hover {
      background: #f3f4f6;
    }

    .grid-wrapper { width: 100%; overflow-x: auto; }
    .grid-inner { min-width: 2240px; }

    .column-labels {
      display: flex;
      align-items: stretch;
      background: #f3f4f6;
      padding: 10px 8px 4px;
      box-sizing: border-box;
      border-bottom: 1px solid #d1d5db;
    }

    .header-cell {
      padding: 0 4px;
      display: flex;
      align-items: center;
      box-sizing: border-box;
      flex: 0 0 auto;
      font-weight: 600;
      color: #4b5563;
      font-size: 14px;
    }

    .header-status { width: 40px; }
    .header-checkbox { width: 40px; }
    .header-image { width: 100px; }
    .header-model { width: 80px; }
    .header-exterior { width: 280px; }
    .header-interior { width: 280px; }
    .header-year { width: 80px; }
    .header-vin { width: 360px; }
    .header-packages { width: 420px; }
    .header-msrp { width: 130px; }
    .header-dealer { width: 420px; }

    .cell-status { width: 40px; }
    .cell-checkbox { width: 40px; }
    .cell-image { width: 100px; }
    .cell-model { width: 80px; }
    .cell-exterior { width: 280px; }
    .cell-interior { width: 280px; }
    .cell-year { width: 80px; }
    .cell-vin { width: 360px; }
    .cell-packages { width: 420px; }
    .cell-msrp { width: 130px; }
    .cell-dealer { width: 360px; }

    .side-panel {
      position: fixed;
      right: -400px;
      top: 64px;
      width: 400px;
      height: calc(100vh - 64px);
      background: white;
      box-shadow: -2px 0 8px rgba(0,0,0,0.15);
      transition: right 0.3s ease;
      z-index: 1000;
      overflow-y: auto;
    }

    .side-panel.open { right: 0; }

    .side-panel-header {
      background: white;
      padding: 16px 20px;
      border-bottom: 1px solid #e5e7eb;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .side-panel-header-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .side-panel-title { font-size: 13px; color: #6b7280; }

    .side-panel-close {
      background: none;
      border: none;
      font-size: 20px;
      cursor: pointer;
      color: #6b7280;
      padding: 4px;
    }

    .side-panel-close:hover { color: #1f2937; }

    .side-panel-vehicle-name {
      font-size: 18px;
      font-weight: 600;
      color: #1f2937;
      margin-bottom: 4px;
    }

    .side-panel-vehicle-info { font-size: 13px; color: #6b7280; }

    .side-panel-divider {
      background: #dc2626;
      padding: 8px 0;
      text-align: center;
      cursor: pointer;
    }

    .side-panel-divider-arrow { color: white; font-size: 14px; }

    .side-panel-menu { background: #dc2626; padding: 0; }
    .side-panel-menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0; }

    .side-panel-menu-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px 16px;
      background: #dc2626;
      cursor: pointer;
      transition: background 0.2s;
      border: none;
      border-right: 1px solid rgba(255, 255, 255, 0.1);
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      color: white;
      min-height: 80px;
    }

    .side-panel-menu-item:nth-child(2n) { border-right: none; }
    .side-panel-menu-item:hover { background: #b91c1c; }
    .side-panel-menu-icon { margin-bottom: 8px; font-size: 18px; }
    .side-panel-menu-text { font-size: 14px; font-weight: 500; text-align: center; }

    .selection-count {
      position: fixed;
      top: 72px;
      right: 20px;
      background: white;
      padding: 8px 16px;
      border-radius: 6px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      font-size: 14px;
      font-weight: 600;
      z-index: 999;
      display: none;
    }

    .selection-count.visible { display: block; }

    .cell-checkbox input[type="checkbox"]:checked { accent-color: #2563eb; }

    .table-row.selected {
      background: #dbeafe !important;
      border-left: 3px solid #2563eb;
    }

    .table-header {
      display: flex;
      align-items: center;
      background: #eceff1;
      padding: 4px 8px;
      border-bottom: 1px solid #d1d5db;
    }

    .filter-input {
      width: 100%;
      padding: 4px 6px;
      border-radius: 10px;
      border: 1px solid #d1d5db;
      font-size: 13px;
      height: 30px;
      background: #ffffff;
      color: #111827;
      outline: none;
      transition: box-shadow 0.2s ease, border-color 0.2s ease;
    }

    .filter-input:focus {
      border-color: transparent;
      background: linear-gradient(
        135deg,
        #0f0f10,
        #1a1a1d,
        #2a004f,
        #7a00ff,
        #00e0ff
      );
      background-size: 500% 500%;
      animation: gradientFlow 18s ease infinite;
      color: #ffffff;
      box-shadow: 0 0 0 3px rgba(0,224,255,0.18), 0 0 0 6px rgba(122,0,255,0.12);
    }

    .filter-input:focus::placeholder { color: rgba(255,255,255,0.75); }

    @keyframes gradientFlow {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .status-circle {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: #10b981;
      color: #ffffff;
      text-align: center;
      line-height: 24px;
      font-size: 12px;
      font-weight: 600;
    }

    .cell-checkbox input[type="checkbox"] { width: 16px; height: 16px; cursor: pointer; }

    .table-row {
      display: flex;
      align-items: center;
      padding: 12px 8px;
      background: #f3f4f6;
      border-bottom: 1px solid #ddd;
      min-height: 50px;
    }

    .table-row:nth-child(even) { background: #eceff1; }

    .cell {
      padding: 0 4px;
      display: flex;
      align-items: center;
      font-size: 14px;
      line-height: 1.4;
      box-sizing: border-box;
      flex: 0 0 auto;
    }

    .exterior-thumbnail {
      width: 90px;
      height: 60px;
      object-fit: cover;
      border-radius: 4px;
      background: #f3f4f6;
    }

    .model-code { font-weight: 600; color: #1e293b; font-size: 13px; }

    .color-display { display: flex; align-items: center; gap: 8px; }

    .color-circle {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 1px solid #999;
      flex-shrink: 0;
    }

    .interior-display { display: flex; align-items: center; gap: 8px; }

    .interior-square {
      width: 32px;
      height: 32px;
      border-radius: 4px;
      background-size: cover;
      background-position: center;
      border: 1px solid #999;
      flex-shrink: 0;
      background-color: #d1d5db;
    }

    .cell-vin {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      gap: 6px;
    }

    .vin-text {
      display: inline-block;
      color: #111827;
      padding: 0;
      font-weight: 500;
      letter-spacing: 0.02em;
      font-size: 13px;
    }

    .cell-msrp { font-weight: 600; color: #059669; }

    .packages-short {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 390px;
      display: block;
    }

    .copy-btn {
      border: 1px solid #d1d5db;
      background: #f9fafb;
      border-radius: 4px;
      font-size: 11px;
      padding: 2px 5px;
      cursor: pointer;
    }

    .copy-btn:hover { background: #e5e7eb; }

    .copy-btn.copied {
      background: #16a34a;
      border-color: #16a34a;
      color: #fff;
    }

    .tooltip { position: relative; }
    .tooltiptext { display: none; position: absolute; z-index: 20; }
    .tooltip:hover .tooltiptext { display: block; }

    .tooltip-red-content {
      background: #b91c1c;
      color: #fff;
      padding: 10px 18px;
      border-radius: 8px;
      font-size: 15px;
      line-height: 1.35;
      top: 110%;
      left: 0;
      white-space: nowrap;
      box-shadow: 0 8px 18px rgba(0,0,0,0.35);
    }

    .tooltip-packages {
      background: #b91c1c;
      color: #fff;
      padding: 12px 18px;
      border-radius: 8px;
      font-size: 14px;
      line-height: 1.5;
      top: 110%;
      left: 0;
      min-width: 300px;
      max-width: 450px;
      white-space: normal;
      box-shadow: 0 8px 18px rgba(0,0,0,0.35);
    }

    .tooltip-packages div { margin: 4px 0; }

    .loading { text-align: center; padding: 60px 20px; color: #64748b; }

    .loading-spinner {
      width: 50px;
      height: 50px;
      border: 4px solid #e2e8f0;
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 1000px) {
      .left-sidebar {
        width: 280px;
        min-width: 280px;
      }
    }

    @media (max-width: 900px) {
      .top-nav {
        padding: 0 16px;
      }

      .owner-row {
        padding: 16px 16px 8px;
      }

      .summary-row {
        padding: 8px 16px;
      }

      .left-sidebar {
        width: 260px;
        min-width: 260px;
      }
    }
  </style>
</head>

<body>
  <div class="app-shell">
    <header class="top-nav">
      <div class="top-nav-left">
        <a class="top-nav-home" href="index.html">Home</a>
      </div>
      <div class="top-nav-center">
        <span>F87 M2</span>
        <span class="divider">|</span>
        <span>U.S/Canada Database</span>
      </div>
      <div class="top-nav-right">
        <div class="user-menu" id="user-menu">
          <button class="user-menu-btn" id="user-menu-btn" type="button" onclick="toggleUserMenu()">
            <span id="auth-username">Member</span>
            <span class="user-icon">👤</span>
          </button>
          <div class="user-menu-dropdown" id="user-menu-dropdown">
            <a class="user-menu-link" href="https://www.authpro.com/auth/sman201/?action=logout">Logout</a>
          </div>
        </div>
      </div>
    </header>

    <div class="owner-row">
      <div class="owner-pill"></div>
      <div class="owner-labels">
        <span class="owner-main">Owner images</span>
        <span class="owner-sub">F87 M2 Inventory</span>
      </div>
    </div>

    <div class="page-layout">
      <aside class="left-sidebar" id="left-sidebar">
        <button class="sidebar-toggle" id="sidebar-toggle" onclick="toggleSidebar()" title="Hide filters">◀</button>

        <div class="sidebar-content">
          <div class="sidebar-title">Filter Inventory</div>

          <div class="sidebar-section">
            <label class="sidebar-label" for="dataset-select">Dataset</label>
            <select id="dataset-select" class="sidebar-select" onchange="handleDatasetChange(this.value)">
              <option value="2016 F87 M2.csv">2016 M2</option>
              <option value="2017 F87 M2.csv">2017 M2</option>
            </select>
          </div>

          <div class="sidebar-section">
            <label class="sidebar-label">Exterior Breakdown</label>
            <div class="sidebar-chart-card">
              <div class="sidebar-chart-wrap">
                <canvas id="exteriorPieChart"></canvas>
              </div>
            </div>
          </div>

          <div class="sidebar-section">
            <label class="sidebar-label">Transmission Breakdown</label>
            <div class="sidebar-chart-card">
              <div class="sidebar-chart-wrap">
                <canvas id="transmissionPieChart"></canvas>
              </div>
            </div>
          </div>
        </div>
      </aside>

      <div class="main-content">
        <div class="summary-row">
          <div class="summary-left">
            <input type="checkbox" class="summary-checkbox" />
            <span class="summary-text">
              <span id="count">0</span> of <span id="total-count">0</span> Vehicle(s)
            </span>
            <span class="badge-m2">M2</span>
            <div id="active-filters" class="active-filters-inline"></div>
          </div>
        </div>

        <div class="grid-wrapper">
          <div class="grid-inner">
            <div class="column-labels">
              <div class="header-cell header-checkbox"></div>
              <div class="header-cell header-status">Cat.</div>
              <div class="header-cell header-image">Image</div>
              <div class="header-cell header-model">Model</div>
              <div class="header-cell header-exterior">Exterior</div>
              <div class="header-cell header-interior">Interior</div>
              <div class="header-cell header-year">Year</div>
              <div class="header-cell header-vin">VIN</div>
              <div class="header-cell header-packages">Packages(Destination Charge: $995)</div>
              <div class="header-cell header-msrp">MSRP</div>
              <div class="header-cell header-dealer">Dealer Name</div>
            </div>

            <div class="table-header">
              <div class="header-cell header-checkbox"></div>
              <div class="header-cell header-status"></div>
              <div class="header-cell header-image"></div>

              <div class="header-cell header-model">
                <input class="filter-input" data-field="model" placeholder="Filter..." />
              </div>
              <div class="header-cell header-exterior">
                <input class="filter-input" data-field="exterior" placeholder="Filter..." />
              </div>
              <div class="header-cell header-interior">
                <input class="filter-input" data-field="interior" placeholder="Filter..." />
              </div>
              <div class="header-cell header-year">
                <input class="filter-input" data-field="year" placeholder="Filter..." />
              </div>
              <div class="header-cell header-vin">
                <input class="filter-input" data-field="vin" placeholder="Filter..." />
              </div>
              <div class="header-cell header-packages">
                <input class="filter-input" data-field="packages" placeholder="Filter..." />
              </div>
              <div class="header-cell header-msrp">
                <input class="filter-input" data-field="msrp" placeholder="Filter..." />
              </div>
              <div class="header-cell header-dealer">
                <input class="filter-input" data-field="dealer" placeholder="Filter..." />
              </div>
            </div>

            <div id="table-rows">
              <div class="loading">
                <div class="loading-spinner"></div>
                <div>Loading vehicle data...</div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="selection-count" id="selection-count">
    <span id="selection-count-text">0 Selected</span>
  </div>

  <div class="side-panel" id="side-panel">
    <div class="side-panel-header">
      <div class="side-panel-header-top">
        <div class="side-panel-title">1 Selected</div>
        <button class="side-panel-close" onclick="closeSidePanel()">✕</button>
      </div>
      <div class="side-panel-vehicle-name" id="panel-vehicle-name">-</div>
      <div class="side-panel-vehicle-info" id="panel-vehicle-info">-</div>
    </div>
    <div class="side-panel-divider">
      <span class="side-panel-divider-arrow">▼</span>
    </div>
    <div class="side-panel-menu">
      <div class="side-panel-menu-grid">
        <div class="side-panel-menu-item" onclick="handleDetailsClick()">
          <span class="side-panel-menu-icon">☰</span>
          <span class="side-panel-menu-text">Details</span>
        </div>
        <div class="side-panel-menu-item" onclick="handleVSpecClick()">
          <span class="side-panel-menu-icon">📋</span>
          <span class="side-panel-menu-text">V-Spec</span>
        </div>
        <div class="side-panel-menu-item" onclick="handleStickerClick()">
          <span class="side-panel-menu-icon">🏷️</span>
          <span class="side-panel-menu-text">Sticker</span>
        </div>
        <div class="side-panel-menu-item" onclick="handleInvoiceClick()">
          <span class="side-panel-menu-icon">📄</span>
          <span class="side-panel-menu-text">Invoice</span>
        </div>
      </div>
    </div>
  </div>

  <script>
    const colorLookup = {};
    const interiorLookup = {};
    const packageLookup = {};
    let currentCsvFile = "2016 F87 M2.csv";
    let vehicles = [];
    let filteredVehicles = [];
    let selectedVehicles = new Set();
    let exteriorPieChart = null;
    let transmissionPieChart = null;

    const defaultColors = {
      "300": { rgb: "244, 244, 236", name: "300 - Alpine White III", image: "https://github.com/Sman19/F87-M2-Ext-Int/blob/62fa3456fbd19b97c9772c0307a30f3c656ae3c9/2017_M2_Alpine_White_380x260.png?raw=true" },
      "475": { rgb: "0, 0, 0", name: "475 - Black Sapphire Metallic", image: "https://github.com/Sman19/F87-M2-Ext-Int/blob/62fa3456fbd19b97c9772c0307a30f3c656ae3c9/2017_M2_Black_Sapphire_380x260.png?raw=true" },
      "C16": { rgb: "3,137,197", name: "C16 - Long Beach Blue Metallic", image: "https://github.com/Sman19/F87-M2-Ext-Int/blob/62fa3456fbd19b97c9772c0307a30f3c656ae3c9/2017_M2_Long_Beach_Blue_380x260.png?raw=true" },
      "B39": { rgb: "105,116,137", name: "B39 - Mineral Grey Metallic", image: "https://github.com/Sman19/F87-M2-Ext-Int/blob/c3be7f7ddc554a924c667c73698c21a2c7a04a75/2017_M2_Mineral_Grey_380x260.png?raw=true" },
      "B67": { rgb: "234,217,86", name: "B67 - Austin Yellow Metallic", image: "https://github.com/Sman19/F87-M2-Ext-Int/blob/c3be7f7ddc554a924c667c73698c21a2c7a04a75/Austin%20Yellow%20Metallic_380x260.png?raw=true" }
    };

    const defaultInteriors = {
      "LCNL": {
        image: "https://raw.githubusercontent.com/Sman19/F87-M2-Ext-Int/07ab816750f6763c0491ee47bf25568a7bb2a11f/m2%20interior%20Blue%20Stit.png",
        description: "LCNL - Black Vernasca Leather w. Blue Stitch"
      },
      "Z1XX": {
        image: "https://raw.githubusercontent.com/Sman19/F87-M2-Ext-Int/c3be7f7ddc554a924c667c73698c21a2c7a04a75/Austin%20yellow%20stitch.png",
        description: "Z1XX - Black Dakota Leather w. Yellow Stitch"
      }
    };

    const defaultPackages = {
      "IND": "BMW Individual (Paint) - $5,000.00"
    };

    function normalize(text) {
      return (text || "").toLowerCase().trim();
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function debounce(func, wait) {
      let timeout;
      return function (...args) {
        clearTimeout(timeout);
        timeout = setTimeout(() => func(...args), wait);
      };
    }

    function getCsvFileFromUrl() {
      const params = new URLSearchParams(window.location.search);
      return params.get("file") || "2016 F87 M2.csv";
    }

    function syncDatasetDropdown() {
      const select = document.getElementById("dataset-select");
      if (select) select.value = currentCsvFile;
    }

    function handleDatasetChange(fileName) {
      const url = new URL(window.location.href);
      url.searchParams.set("file", fileName);
      window.location.href = url.toString();
    }

    function toggleSidebar() {
      const sidebar = document.getElementById("left-sidebar");
      const toggle = document.getElementById("sidebar-toggle");

      if (!sidebar || !toggle) return;

      sidebar.classList.toggle("collapsed");

      if (sidebar.classList.contains("collapsed")) {
        toggle.textContent = "▶";
        toggle.title = "Show filters";
      } else {
        toggle.textContent = "◀";
        toggle.title = "Hide filters";
      }
    }

    function updateAuthUser() {
      const el = document.getElementById("auth-username");
      if (!el) return;

      if (typeof login !== "undefined" && login) {
        el.textContent = login;
      } else {
        el.textContent = "Member";
      }
    }

    function toggleUserMenu() {
      const dropdown = document.getElementById("user-menu-dropdown");
      if (!dropdown) return;
      dropdown.classList.toggle("open");
    }

    document.addEventListener("click", function (event) {
      const menu = document.getElementById("user-menu");
      const dropdown = document.getElementById("user-menu-dropdown");
      if (!menu || !dropdown) return;

      if (!menu.contains(event.target)) {
        dropdown.classList.remove("open");
      }
    });

    function parseCSVLine(line) {
      const result = [];
      let current = "";
      let inQuotes = false;

      for (let i = 0; i < line.length; i++) {
        const char = line[i];
        const next = line[i + 1];

        if (char === '"') {
          if (inQuotes && next === '"') {
            current += '"';
            i++;
          } else {
            inQuotes = !inQuotes;
          }
        } else if (char === "," && !inQuotes) {
          result.push(current.trim());
          current = "";
        } else {
          current += char;
        }
      }

      result.push(current.trim());
      return result;
    }

    function parseCSV(text) {
      const lines = text
        .replace(/\r\n/g, "\n")
        .replace(/\r/g, "\n")
        .split("\n")
        .filter(line => line.trim() !== "");

      if (!lines.length) return [];

      const headers = parseCSVLine(lines[0]).map(h => h.trim());

      return lines.slice(1).map(line => {
        const values = parseCSVLine(line);
        const row = {};
        headers.forEach((header, index) => {
          row[header] = values[index] || "";
        });
        return row;
      });
    }

    function getField(row, possibleNames) {
      const keys = Object.keys(row);

      for (const name of possibleNames) {
        const foundKey = keys.find(key => key.toLowerCase().trim() === name.toLowerCase().trim());
        if (foundKey && row[foundKey]) return row[foundKey];
      }

      return "";
    }

    function extractCode(value) {
      const raw = String(value || "").trim();
      if (!raw) return "";
      return raw.split(" - ")[0].trim();
    }

    function cleanLabel(value) {
      const raw = String(value || "").trim();
      if (!raw) return "-";
      return raw;
    }

    function getColorData(codeOrName) {
      const raw = String(codeOrName || "").trim();
      const code = extractCode(raw);

      if (defaultColors[code]) return defaultColors[code];

      const byName = Object.values(defaultColors).find(c => normalize(c.name) === normalize(raw));
      if (byName) return byName;

      const byCombinedName = Object.values(defaultColors).find(c => normalize(raw).includes(normalize(c.name)));
      if (byCombinedName) return byCombinedName;

      return null;
    }

    function getInteriorData(codeOrName) {
      const raw = String(codeOrName || "").trim();
      const code = extractCode(raw);

      if (defaultInteriors[code]) return defaultInteriors[code];

      const byDescription = Object.values(defaultInteriors).find(i => normalize(i.description) === normalize(raw));
      if (byDescription) return byDescription;

      const byCombinedDescription = Object.values(defaultInteriors).find(i => normalize(raw).includes(normalize(i.description)));
      if (byCombinedDescription) return byCombinedDescription;

      return null;
    }

    function getPackageDetail(code) {
      return packageLookup[code] || defaultPackages[code] || code;
    }

    function parsePackageCodes(value) {
      return String(value || "")
        .split(/[,\s]+/)
        .map(v => v.trim())
        .filter(Boolean);
    }

    function getExteriorChartColor(code) {
      const colorData = defaultColors[code];
      if (!colorData || !colorData.rgb) return "rgb(180,180,180)";
      return `rgb(${colorData.rgb})`;
    }

    function buildVehicle(row) {
      const exteriorRaw = getField(row, ["EXTERIOR", "Exterior", "Color", "Paint Code", "PAINT"]);
      const interiorRaw = getField(row, ["INTERIOR", "Interior", "Trim", "Upholstery"]);
      const year = getField(row, ["YEAR", "Year", "Model Year", "MY"]);
      const vin = getField(row, ["VIN", "Vin", "Full VIN", "Full VIN Number"]).trim();

      const msrp = getField(row, [
        "MSRP",
        "msrp",
        "Total MSRP",
        "TOTAL MSRP",
        "Base MSRP",
        "Retail Price",
        "Vehicle MSRP"
      ]);

      const dealer = getField(row, [
        "DEALER NAME",
        "Dealer Name",
        "Dealer",
        "Selling Dealer",
        "Dealer Name "
      ]);

      const details = getField(row, ["DETAILS", "Details"]);
      const vspec = getField(row, ["V-SPEC", "VSPEC", "VSpec"]);
      const sticker = getField(row, ["STICKER", "Monroney", "Window Sticker"]);
      const invoice = getField(row, ["INVOICE", "Invoice"]);
      const model = getField(row, ["MODEL", "Model"]) || "M2";

      const packageCodesRaw = getField(row, ["Package Codes", "PACKAGE CODES", "PACKAGES", "Packages"]);
      const packageCodes = parsePackageCodes(packageCodesRaw);
      const packageDetails = packageCodes.map(code => getPackageDetail(code));

      const exteriorData = getColorData(exteriorRaw);
      const interiorData = getInteriorData(interiorRaw);

      return {
        model,
        exteriorCode: extractCode(exteriorRaw),
        exteriorName: cleanLabel(exteriorRaw || (exteriorData ? exteriorData.name : "-")),
        exteriorImage: exteriorData ? exteriorData.image : "",
        exteriorRgb: exteriorData ? exteriorData.rgb : "220,220,220",
        interiorCode: extractCode(interiorRaw),
        interiorName: cleanLabel(interiorRaw || (interiorData ? interiorData.description : "-")),
        interiorImage: interiorData ? interiorData.image : "",
        year,
        vin,
        packageCodes,
        packageDetails,
        packageText: packageDetails.length ? packageDetails.join(" | ") : (packageCodesRaw || "-"),
        msrp: msrp || "-",
        dealer: dealer || "-",
        details,
        vspec,
        sticker,
        invoice
      };
    }

    function renderTable(data) {
      const table = document.getElementById("table-rows");

      if (!data.length) {
        table.innerHTML = `
          <div style="padding: 40px; text-align: center; color: #6b7280;">
            <h3>No vehicles found</h3>
          </div>
        `;
        return;
      }

      table.innerHTML = "";

      data.forEach((vehicle, index) => {
        const row = document.createElement("div");
        row.className = "table-row";
        row.dataset.vin = vehicle.vin || "";

        const packageDetailsHtml = vehicle.packageDetails
          .map(detail => `<div>${escapeHtml(detail)}</div>`)
          .join("");

        row.innerHTML = `
          <div class="cell cell-checkbox">
            <input type="checkbox" ${selectedVehicles.has(vehicle.vin) ? "checked" : ""} />
          </div>

          <div class="cell cell-status">
            <div class="status-circle">M</div>
          </div>

          <div class="cell cell-image">
            ${
              vehicle.exteriorImage
                ? `<img class="exterior-thumbnail" src="${escapeHtml(vehicle.exteriorImage)}" alt="${escapeHtml(vehicle.exteriorName)}" />`
                : `<div class="exterior-thumbnail"></div>`
            }
          </div>

          <div class="cell cell-model">
            <span class="model-code">${escapeHtml(vehicle.model)}</span>
          </div>

          <div class="cell cell-exterior">
            <div class="tooltip">
              <div class="color-display">
                <span class="color-circle" style="background-color: rgb(${escapeHtml(vehicle.exteriorRgb)});"></span>
                <span>${escapeHtml(vehicle.exteriorName)}</span>
              </div>
              <div class="tooltiptext tooltip-red-content">${escapeHtml(vehicle.exteriorName)}</div>
            </div>
          </div>

          <div class="cell cell-interior">
            <div class="tooltip">
              <div class="interior-display">
                ${
                  vehicle.interiorImage
                    ? `<span class="interior-square" style="background-image: url('${escapeHtml(vehicle.interiorImage)}')"></span>`
                    : `<span class="interior-square"></span>`
                }
                <span>${escapeHtml(vehicle.interiorName)}</span>
              </div>
              <div class="tooltiptext tooltip-red-content">${escapeHtml(vehicle.interiorName)}</div>
            </div>
          </div>

          <div class="cell cell-year">${escapeHtml(vehicle.year || "-")}</div>

          <div class="cell cell-vin">
            <div class="tooltip">
              <span class="vin-text" id="vin-${index}">${escapeHtml(vehicle.vin || "-")}</span>
              <div class="tooltiptext tooltip-red-content">${escapeHtml(vehicle.vin || "-")}</div>
            </div>
            ${
              vehicle.vin
                ? `<button class="copy-btn" data-copy-target="vin-${index}" title="Copy VIN">⧉</button>`
                : ""
            }
          </div>

          <div class="cell cell-packages">
            <div class="tooltip">
              <span class="packages-short">${escapeHtml(vehicle.packageText)}</span>
              ${
                vehicle.packageDetails.length
                  ? `<div class="tooltiptext tooltip-packages"><strong>Package Details:</strong><br>${packageDetailsHtml}</div>`
                  : ""
              }
            </div>
          </div>

          <div class="cell cell-msrp">${escapeHtml(vehicle.msrp || "-")}</div>

          <div class="cell cell-dealer">
            <div class="tooltip">
              <span>${escapeHtml(vehicle.dealer || "-")}</span>
              ${vehicle.dealer ? `<div class="tooltiptext tooltip-red-content">${escapeHtml(vehicle.dealer)}</div>` : ""}
            </div>
          </div>
        `;

        table.appendChild(row);

        const checkbox = row.querySelector('input[type="checkbox"]');
        checkbox.addEventListener("change", function () {
          handleCheckboxChange(this, vehicle);
        });
      });

      initCopyButtons();
    }

    function initCopyButtons() {
      document.querySelectorAll(".copy-btn").forEach((btn) => {
        btn.addEventListener("click", async function () {
          const targetId = this.dataset.copyTarget;
          const target = document.getElementById(targetId);
          const value = target ? target.textContent.trim() : "";

          if (!value) return;

          try {
            await navigator.clipboard.writeText(value);
            const original = this.textContent;
            this.textContent = "✓";
            this.classList.add("copied");

            setTimeout(() => {
              this.textContent = original;
              this.classList.remove("copied");
            }, 1000);
          } catch (err) {
            console.error("Copy failed:", err);
          }
        });
      });
    }

    function getActiveFilters() {
      const filters = {};
      document.querySelectorAll(".filter-input").forEach(input => {
        const field = input.dataset.field;
        const value = (input.value || "").trim();
        if (value) filters[field] = value;
      });
      return filters;
    }

    function removeFilter(field) {
      const input = document.querySelector(`.filter-input[data-field="${field}"]`);
      if (input) {
        input.value = "";
        applyFilters();
      }
    }

    function clearAllFilters() {
      document.querySelectorAll(".filter-input").forEach(input => {
        input.value = "";
      });
      applyFilters();
    }

    function renderActiveFilterChips(filters) {
      const activeFiltersContainer = document.getElementById("active-filters");
      if (!activeFiltersContainer) return;

      activeFiltersContainer.innerHTML = "";

      const fieldLabels = {
        model: "Model",
        exterior: "Exterior",
        interior: "Interior",
        year: "Year",
        vin: "VIN",
        packages: "Packages",
        msrp: "MSRP",
        dealer: "Dealer"
      };

      const filterKeys = Object.keys(filters);
      if (!filterKeys.length) return;

      filterKeys.forEach(field => {
        const chip = document.createElement("div");
        chip.className = "filter-chip";
        chip.innerHTML = `
          ${fieldLabels[field] || field}: ${escapeHtml(filters[field])}
          <span class="filter-chip-remove" data-field="${field}">✕</span>
        `;
        activeFiltersContainer.appendChild(chip);
      });

      const clearBtn = document.createElement("button");
      clearBtn.className = "clear-filters-btn";
      clearBtn.type = "button";
      clearBtn.textContent = "Clear All";
      clearBtn.onclick = clearAllFilters;
      activeFiltersContainer.appendChild(clearBtn);

      activeFiltersContainer.querySelectorAll(".filter-chip-remove").forEach(btn => {
        btn.addEventListener("click", () => removeFilter(btn.dataset.field));
      });
    }

    function matchesFilter(text, rawFilter) {
      const cellText = normalize(text);
      const parts = String(rawFilter || "")
        .split(",")
        .map(part => part.trim())
        .filter(Boolean);

      for (const part of parts) {
        if (/^-\s*/.test(part)) {
          const excludeTerm = normalize(part.replace(/^-\s*/, ""));
          if (excludeTerm && cellText.includes(excludeTerm)) {
            return false;
          }
        } else {
          const includeTerm = normalize(part);
          if (includeTerm && !cellText.includes(includeTerm)) {
            return false;
          }
        }
      }

      return true;
    }

    function getVehicleFieldText(vehicle, field) {
      switch (field) {
        case "model": return vehicle.model;
        case "exterior": return vehicle.exteriorName + " " + vehicle.exteriorCode;
        case "interior": return vehicle.interiorName + " " + vehicle.interiorCode;
        case "year": return vehicle.year;
        case "vin": return vehicle.vin;
        case "packages": return vehicle.packageText + " " + vehicle.packageCodes.join(" ");
        case "msrp": return vehicle.msrp;
        case "dealer": return vehicle.dealer;
        default: return "";
      }
    }

    function applyFilters() {
      const filters = getActiveFilters();
      renderActiveFilterChips(filters);

      filteredVehicles = vehicles.filter(vehicle => {
        for (const field in filters) {
          const value = getVehicleFieldText(vehicle, field);
          if (!matchesFilter(value, filters[field])) {
            return false;
          }
        }
        return true;
      });

      renderTable(filteredVehicles);
      document.getElementById("count").textContent = filteredVehicles.length;
      updateCharts();
    }

    function updateCharts() {
      const exteriorCounts = {};
      const transmissionCounts = {
        "Automatic (2MK)": 0,
        "6-Speed Manual": 0
      };

      filteredVehicles.forEach(vehicle => {
        const exteriorCode = vehicle.exteriorCode || "Unknown";
        exteriorCounts[exteriorCode] = (exteriorCounts[exteriorCode] || 0) + 1;

        if (vehicle.packageCodes.includes("2MK")) {
          transmissionCounts["Automatic (2MK)"]++;
        } else {
          transmissionCounts["6-Speed Manual"]++;
        }
      });

      const exteriorLabels = Object.keys(exteriorCounts);
      const exteriorData = Object.values(exteriorCounts);

      const transmissionLabels = Object.keys(transmissionCounts);
      const transmissionData = Object.values(transmissionCounts);

      const exteriorCanvas = document.getElementById("exteriorPieChart");
      const transmissionCanvas = document.getElementById("transmissionPieChart");

      if (exteriorPieChart) exteriorPieChart.destroy();
      if (transmissionPieChart) transmissionPieChart.destroy();

      exteriorPieChart = new Chart(exteriorCanvas, {
        type: "pie",
        data: {
          labels: exteriorLabels.length ? exteriorLabels : ["No Results"],
          datasets: [{
            data: exteriorData.length ? exteriorData : [1],
            backgroundColor: exteriorLabels.length
              ? exteriorLabels.map(code => getExteriorChartColor(code))
              : ["rgb(180,180,180)"],
            borderColor: "#ffffff",
            borderWidth: 2
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: {
              position: "bottom",
              labels: {
                boxWidth: 16,
                boxHeight: 16,
                padding: 12,
                generateLabels(chart) {
                  const labels = chart.data.labels || [];
                  const dataset = chart.data.datasets[0];
                  const total = (dataset.data || []).reduce((sum, value) => sum + value, 0);

                  return labels.map((label, i) => {
                    const value = dataset.data[i] || 0;
                    const percent = total ? ((value / total) * 100).toFixed(1) : "0.0";

                    return {
                      text: `${percent}%  ${label}`,
                      fillStyle: dataset.backgroundColor[i],
                      strokeStyle: dataset.backgroundColor[i],
                      lineWidth: 1,
                      hidden: !chart.getDataVisibility(i),
                      index: i
                    };
                  });
                }
              }
            },
            datalabels: {
              color: "#ffffff",
              font: {
                weight: "700",
                size: 11
              },
              formatter: function(value, context) {
                const label = context.chart.data.labels[context.dataIndex];
                return value > 0 ? label : "";
              }
            }
          }
        },
        plugins: [ChartDataLabels]
      });

      transmissionPieChart = new Chart(transmissionCanvas, {
        type: "pie",
        data: {
          labels: transmissionLabels,
          datasets: [{
            data: transmissionData
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: {
              position: "bottom"
            },
            datalabels: {
              color: "#ffffff",
              font: {
                weight: "700",
                size: 10
              },
              formatter: function(value, context) {
                const label = context.chart.data.labels[context.dataIndex];
                return value > 0 ? label : "";
              }
            }
          }
        },
        plugins: [ChartDataLabels]
      });
    }

    function setupFilterInputs() {
      const debouncedApply = debounce(applyFilters, 120);
      document.querySelectorAll(".filter-input").forEach(input => {
        input.addEventListener("input", debouncedApply);
      });
    }

    async function loadCSV() {
      try {
        currentCsvFile = getCsvFileFromUrl();
        syncDatasetDropdown();

        const response = await fetch(encodeURI(currentCsvFile));
        if (!response.ok) {
          throw new Error(`Could not load ${currentCsvFile}`);
        }

        const text = await response.text();
        const rows = parseCSV(text);

        vehicles = [];
        let reachedEnd = false;
        
        rows.forEach(row => {
          const vehicle = buildVehicle(row);
          const vin = String(vehicle.vin || "").trim();
        
          if (vin === "END_VEHICLES") {
            reachedEnd = true;
            return;
          }
        
          if (reachedEnd) return;
        
          if (vin !== "" && vin !== "-" && vin.length >= 11) {
            vehicles.push(vehicle);
          }
        });

        filteredVehicles = [...vehicles];

        document.getElementById("total-count").textContent = vehicles.length;
        document.getElementById("count").textContent = vehicles.length;

        renderTable(vehicles);
        updateCharts();
      } catch (err) {
        console.error("Error loading CSV:", err);
        document.getElementById("table-rows").innerHTML = `
          <div style="padding: 40px; text-align: center; color: #dc3545;">
            <h3>⚠️ Error Loading Data</h3>
            <p>${escapeHtml(err.message)}</p>
            <p>Please ensure the selected CSV file is in the same directory as this HTML file.</p>
          </div>
        `;
      }
    }

    function updateSelectionCount() {
      const count = selectedVehicles.size;
      const counter = document.getElementById("selection-count");
      const text = document.getElementById("selection-count-text");

      if (count > 0) {
        text.textContent = `${count} Selected`;
        counter.classList.add("visible");
      } else {
        counter.classList.remove("visible");
        closeSidePanel();
      }
    }

    function handleCheckboxChange(checkbox, vehicleInfo) {
      const row = checkbox.closest(".table-row");

      if (checkbox.checked) {
        selectedVehicles.add(vehicleInfo.vin);
        row.classList.add("selected");
        openSidePanel(vehicleInfo);
      } else {
        selectedVehicles.delete(vehicleInfo.vin);
        row.classList.remove("selected");
      }

      updateSelectionCount();
    }

    function openSidePanel(vehicleInfo) {
      const panel = document.getElementById("side-panel");
      const vehicleName = document.getElementById("panel-vehicle-name");
      const vehicleInfoEl = document.getElementById("panel-vehicle-info");

      vehicleName.textContent = "F87 M2";
      vehicleInfoEl.textContent = vehicleInfo.vin || "Unknown VIN";

      panel.dataset.currentVin = vehicleInfo.vin || "";
      panel.dataset.currentDetails = vehicleInfo.details || "";
      panel.dataset.currentVspec = vehicleInfo.vspec || "";
      panel.dataset.currentSticker = vehicleInfo.sticker || "";
      panel.dataset.currentInvoice = vehicleInfo.invoice || "";

      panel.classList.add("open");
    }

    function closeSidePanel() {
      document.getElementById("side-panel").classList.remove("open");
    }

    function toRawGithub(url) {
      let u = (url || "").trim();
      if (u.includes("github.com") && !u.includes("/raw/")) u = u.replace("/blob/", "/raw/");
      return u;
    }

    function handleDetailsClick() {
      const panel = document.getElementById("side-panel");
      const url = toRawGithub(panel.dataset.currentDetails);
      const vin = panel.dataset.currentVin;
      if (!vin) return alert("No vehicle selected");
      if (!url) return alert(`Details PDF not available for VIN: ${vin}`);
      window.open(url, "_blank");
    }

    function handleVSpecClick() {
      const panel = document.getElementById("side-panel");
      const url = toRawGithub(panel.dataset.currentVspec);
      const vin = panel.dataset.currentVin;
      if (!vin) return alert("No vehicle selected");
      if (!url) return alert(`V-Spec PDF not available for VIN: ${vin}`);
      window.open(url, "_blank");
    }

    function handleStickerClick() {
      const panel = document.getElementById("side-panel");
      const url = toRawGithub(panel.dataset.currentSticker);
      const vin = panel.dataset.currentVin;
      if (!vin) return alert("No vehicle selected");
      if (!url) return alert(`Window Sticker PDF not available for VIN: ${vin}`);
      window.open(url, "_blank");
    }

    function handleInvoiceClick() {
      const panel = document.getElementById("side-panel");
      const url = toRawGithub(panel.dataset.currentInvoice);
      const vin = panel.dataset.currentVin;
      if (!vin) return alert("No vehicle selected");
      if (!url) return alert(`Invoice PDF not available for VIN: ${vin}`);
      window.open(url, "_blank");
    }

    document.addEventListener("DOMContentLoaded", () => {
      updateAuthUser();
      setupFilterInputs();

      let attempts = 0;
      const maxAttempts = 10;

      const waitForAuthThenLoad = () => {
        attempts++;

        if (typeof login !== "undefined") {
          loadCSV();
          return;
        }

        if (attempts < maxAttempts) {
          setTimeout(waitForAuthThenLoad, 300);
        } else {
          loadCSV();
        }
      };

      waitForAuthThenLoad();
    });

    (() => {
      const favicon = document.getElementById("favicon");
      if (!favicon) return;
      const originalHref = favicon.href;
      let flip = false;

      setInterval(() => {
        favicon.href = flip ? originalHref : originalHref;
        flip = !flip;
      }, 1500);
    })();
  </script>
</body>
</html>
